<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  STATE   phases: no_gps | active
// ═══════════════════════════════════════════════════════════

function getUserId() {
  var uid = localStorage.getItem('porter_user_id');
  if (!uid) {
    uid = 'usr_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('porter_user_id', uid);
  }
  return uid;
}

const state = {
  userId:      getUserId(),
  score:       parseInt(localStorage.getItem('porter_score')       || '0'),
  deliveries:  parseInt(localStorage.getItem('porter_deliveries')  || '0'),
  playerName:  localStorage.getItem('porter_name') || '',
  phase:       'no_gps',
  following:   false,
  userPos:     null,
  sessionDist: parseFloat(localStorage.getItem('porter_session_dist') || '0'),
  lastPos:     null,

  zones:         JSON.parse(localStorage.getItem('porter_zones')        || '[]'),
  drawing:       false,
  gridCells:     null,
  editingZoneId: null,
  painting:      false,
  paintZoneId:   null,

  packages:     JSON.parse(localStorage.getItem('porter_packages')     || '[]'),
  destinations: JSON.parse(localStorage.getItem('porter_destinations') || '[]'),
  carrying:     JSON.parse(localStorage.getItem('porter_carrying')     || '[]'),
  streak:       0,
};

const PROXIMITY_M   = 20;
const MAX_GPS_DELTA = 50;
const CELL_LAT_DEG  = 20 / 111111;
var   CELL_LNG_DEG  = parseFloat(localStorage.getItem('porter_cell_lng')) || CELL_LAT_DEG;
var   gridOffsetLat = parseFloat(localStorage.getItem('porter_grid_lat')) || 0;
var   gridOffsetLng = parseFloat(localStorage.getItem('porter_grid_lng')) || 0;
const ZONE_COLORS   = ['#e8a030', '#3080c0', '#5ab05a', '#c04040', '#8060d0', '#30a0a0'];

const WEIGHT = {
  1: { label: 'LIGHT',    multiplier: 0.7 },
  2: { label: 'STANDARD', multiplier: 1.0 },
  3: { label: 'HEAVY',    multiplier: 1.5 },
};

const PACKAGE_ITEMS = [
  'Vintage Records','Birthday Cake','Fragile Glassware','Fresh Flowers',
  'Electronics','Medical Supplies','Homemade Jam','Library Books',
  'Art Supplies','Potted Plant','Sports Equipment','Baked Goods',
  'Camera Gear','Musical Instrument','Craft Beer','Antique Clock',
  'Handmade Pottery','Mystery Box','Holiday Decor','Fresh Produce',
  'Board Games','Leather Goods','Candles','Vinyl Collection',
];

const DROP_FIRST_NAMES = [
  'Alice','Marcus','Elena','James','Sofia','Omar','Priya','Leo',
  'Naomi','Felix','Yuki','Carlos','Fatima','Soren','Mei','Ivan',
  'Amara','Hugo','Leila','Tobias','Nadia','Ravi','Iris','Finn'
];
const DROP_LAST_NAMES = [
  'Chen','Rivera','Kowalski','Osei','Nakamura','Dubois','Patel','Berg',
  'Santos','Müller','Park','Okonkwo','Ferreira','Lindström','Abboud','Walsh',
  'Moreau','Tanaka','Reyes','Fischer','Diallo','Nguyen','Eriksson','Yamamoto'
];

function randomDropName() {
  var first = DROP_FIRST_NAMES[Math.floor(Math.random() * DROP_FIRST_NAMES.length)];
  var last  = DROP_LAST_NAMES[Math.floor(Math.random() * DROP_LAST_NAMES.length)];
  return first + ' ' + last;
}

function getDropTotalDeliveries(dest) {
  if (dest.contributions && dest.contributions.length) {
    return dest.contributions.reduce(function(s, c) { return s + (c.deliveries || 0); }, 0);
  }
  return dest.deliveries || 0;
}

function calcDropLevel(deliveries) {
  return Math.min(100, Math.floor(Math.log(deliveries + 1) / Math.log(1.1)));
}

function deliveriesToNextLevel(deliveries, level) {
  if (level >= 100) return 0;
  return Math.max(0, Math.ceil(Math.pow(1.1, level + 1)) - 1 - deliveries);
}

function nextDropLabel() {
  var taken = new Set(state.destinations.map(function(d) { return d.label; }));
  for (var i = 0; i < 26; i++) {
    var l = String.fromCharCode(65 + i);
    if (!taken.has(l)) return l;
  }
  return String.fromCharCode(65 + (state.destinations.length % 26));
}

var refreshTimer = null;
var toastTimer   = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeColor(c) { return /^#[0-9a-fA-F]{3,6}$/.test(c) ? c : '#e8a030'; }

function vibrate(p)    { if (navigator.vibrate) navigator.vibrate(p); }

function showToast(msg, duration) {
  var el = document.getElementById('toast');
  if (toastTimer) clearTimeout(toastTimer);
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(function() { el.classList.remove('show'); toastTimer = null; }, duration || 3000);
}
function getCapacity() { return Math.min(3 + Math.floor(state.score / 500), 12); }
function currentLoad() {
  return state.carrying.reduce(function(s, id) {
    var p = state.packages.find(function(p) { return p.id === id; });
    return s + (p ? p.weight : 0);
  }, 0);
}

// ═══════════════════════════════════════════════════════════
//  FOLLOW MODE
// ═══════════════════════════════════════════════════════════

function toggleFollow() {
  if (state.following) {
    state.following = false;
    stopPainting();
    updateFollowBtn();
    return;
  }
  var picker = document.getElementById('paint-picker');
  if (picker.classList.contains('open')) { picker.classList.remove('open'); return; }
  var zones  = state.zones.filter(function(z) { return z.active && z.cells && z.cells.length; });
  var optsEl = document.getElementById('paint-zone-opts');
  optsEl.innerHTML =
    '<button class="paint-zone-opt" style="color:#999" onclick="selectFollowZone(null)">NONE</button>' +
    '<div style="padding:8px 16px 4px;font-size:9px;letter-spacing:3px;color:#444;border-bottom:1px solid rgba(255,255,255,0.05)">PAINT MODE</div>' +
    zones.map(function(z) {
      return '<button class="paint-zone-opt" style="color:' + safeColor(z.color) + '" onclick="selectFollowZone(\'' + esc(z.id) + '\')">' +
        esc(z.name.toUpperCase()) + '</button>';
    }).join('');
  picker.classList.add('open');
}

function selectFollowZone(zoneId) {
  document.getElementById('paint-picker').classList.remove('open');
  state.following = true;
  if (state.userPos) map.panTo([state.userPos.lat, state.userPos.lng], { animate: true, duration: 0.4 });
  if (zoneId) startPainting(zoneId); else stopPainting();
  updateFollowBtn();
}

function updateFollowBtn() {
  var btn = document.getElementById('follow-btn');
  btn.classList.toggle('paint-active', state.following && state.painting);
  btn.classList.toggle('active',       state.following && !state.painting);
}

// ═══════════════════════════════════════════════════════════
//  HUD COLLAPSE
// ═══════════════════════════════════════════════════════════

function expandHUD() { document.getElementById('hud-bottom').classList.remove('collapsed'); }
function toggleHUD() { document.getElementById('hud-bottom').classList.toggle('collapsed'); }

// ═══════════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════════

const map = L.map('map', { zoomControl: false, attributionControl: false, minZoom: 13 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
map.setView([20, 0], 3);

function makeIcon(bg, emoji, size) {
  size = size || 48;
  var fs = Math.round(size * 0.65);
  return L.divIcon({
    html: '<div style="background:' + bg + ';border:2px solid rgba(255,255,255,0.25);border-radius:50%;width:' + size + 'px;height:' + size + 'px;display:flex;align-items:center;justify-content:center;font-size:' + fs + 'px;box-shadow:0 2px 12px rgba(0,0,0,0.7)">' + emoji + '</div>',
    iconSize: [size, size], iconAnchor: [size / 2, size / 2], className: ''
  });
}

function makeDestIcon(bg, letter, size, level) {
  var fs  = Math.round(size * 0.55);
  var lfs = Math.round(size * 0.28);
  var lvlHtml = level > 0
    ? '<div style="font-size:' + lfs + 'px;color:#e8a030;font-family:\'Courier New\',monospace;font-weight:bold;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,1);margin-top:2px;letter-spacing:1px">LV' + level + '</div>'
    : '';
  var h = level > 0 ? size + lfs + 4 : size;
  return L.divIcon({
    html: '<div style="display:flex;flex-direction:column;align-items:center;width:' + size + 'px">' +
      '<div style="background:' + bg + ';border:2px solid rgba(255,255,255,0.25);border-radius:50%;width:' + size + 'px;height:' + size + 'px;display:flex;align-items:center;justify-content:center;font-size:' + fs + 'px;font-weight:bold;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.7);font-family:\'Courier New\',monospace">' + esc(letter) + '</div>' +
      lvlHtml +
    '</div>',
    iconSize: [size, h], iconAnchor: [size / 2, size / 2], className: ''
  });
}

function makePackageIcon(weight, size, isNext, tooHeavy) {
  var bg   = isNext ? '#e8a030' : (tooHeavy ? '#2a1a1a' : '#2a1800');
  var bdr  = '2px solid rgba(255,255,255,0.25)';
  var shd  = '0 2px 8px rgba(0,0,0,0.7)';
  var sub  = Math.round(size * 0.58);
  var fs   = Math.round(sub * 0.60);
  var gap  = Math.max(2, Math.round(size * 0.06));
  var circ = '<div style="background:' + bg + ';border:' + bdr + ';border-radius:50%;width:' + sub + 'px;height:' + sub + 'px;display:flex;align-items:center;justify-content:center;font-size:' + fs + 'px;box-shadow:' + shd + ';flex-shrink:0">📦</div>';

  if (weight === 1) {
    return L.divIcon({
      html: circ,
      iconSize: [sub, sub], iconAnchor: [sub / 2, sub / 2], className: ''
    });
  }

  var w = 2 * sub + gap;
  if (weight === 2) {
    return L.divIcon({
      html: '<div style="display:flex;gap:' + gap + 'px">' + circ + circ + '</div>',
      iconSize: [w, sub], iconAnchor: [w / 2, sub / 2], className: ''
    });
  }

  // weight 3 — two on top, one centred below
  var h = 2 * sub + gap;
  return L.divIcon({
    html: '<div style="display:flex;flex-direction:column;gap:' + gap + 'px;align-items:center">' +
      '<div style="display:flex;gap:' + gap + 'px">' + circ + circ + '</div>' + circ +
    '</div>',
    iconSize: [w, h], iconAnchor: [w / 2, h / 2], className: ''
  });
}

function getCellPixelWidth() {
  var lat = state.userPos ? state.userPos.lat : map.getCenter().lat;
  var p1  = map.latLngToContainerPoint([lat, 0]);
  var p2  = map.latLngToContainerPoint([lat, CELL_LNG_DEG]);
  return Math.abs(p2.x - p1.x);
}

const icons = {
  user: makeIcon('#1a3050', '🧍', 44),
};

let userMarker   = null;
let orderMarkers = [];
let zoneMarkers  = [];

// ═══════════════════════════════════════════════════════════
//  GPS
// ═══════════════════════════════════════════════════════════

if (!navigator.geolocation) {
  document.getElementById('mission-detail').textContent = 'Geolocation not supported.';
} else {
  navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 15000
  });
}

function onLocationUpdate(pos) {
  var lat = pos.coords.latitude, lng = pos.coords.longitude;
  var newPos = { lat: lat, lng: lng };
  if (state.lastPos) {
    var delta = haversine(state.lastPos, newPos);
    if (delta > 0 && delta <= MAX_GPS_DELTA) {
      state.sessionDist += delta;
      localStorage.setItem('porter_session_dist', state.sessionDist.toFixed(1));
    }
  }
  state.lastPos = newPos;
  state.userPos = newPos;
  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: icons.user, zIndexOffset: 1000 }).addTo(map);
    map.setView([lat, lng], 17);
    onGpsLocked();
  } else {
    userMarker.setLatLng([lat, lng]);
    if (state.following) map.panTo([lat, lng], { animate: true, duration: 0.4 });
  }
  if (state.painting && state.paintZoneId) {
    var ph = latLngToHex(lat, lng), pk = hexKey(ph.q, ph.r);
    if (pk !== lastPaintHexKey) { lastPaintHexKey = pk; paintHex(ph.q, ph.r); }
  }
  renderOrderMarkers();
  updateHUD();
}

function onLocationError(err) {
  var msgs = { 1: 'Location permission denied.', 2: 'Position unavailable.', 3: 'GPS timed out. Retrying…' };
  document.getElementById('mission-detail').textContent = msgs[err.code] || err.message;
}

function onGpsLocked() {
  var badge = document.getElementById('gps-status');
  badge.textContent = 'GPS LOCKED';
  badge.className   = 'locked';
  setTimeout(function() { badge.style.display = 'none'; }, 3000);
  state.phase  = 'active';
  if (!state.zones.length) {
    CELL_LNG_DEG = CELL_LAT_DEG / Math.cos(state.userPos.lat * Math.PI / 180);
    localStorage.setItem('porter_cell_lng', CELL_LNG_DEG);
  }
  vibrate(30);
  renderZoneMarkers();
  generateOrders();
  expandHUD();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════

function saveZones()     { localStorage.setItem('porter_zones', JSON.stringify(state.zones)); }
function saveGameState() {
  localStorage.setItem('porter_carrying',     JSON.stringify(state.carrying));
  localStorage.setItem('porter_packages',     JSON.stringify(state.packages));
  localStorage.setItem('porter_destinations', JSON.stringify(state.destinations));
}

// ═══════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════

function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
  document.getElementById('settings-drawer').classList.add('open');
  renderSettingsPanel();
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  document.getElementById('settings-drawer').classList.remove('open');
}

function renderSettingsPanel() {
  var listEl   = document.getElementById('s-zone-list');
  var clearBtn = document.getElementById('s-clear-btn');
  var nameEl   = document.getElementById('s-player-name');
  if (nameEl) nameEl.value = state.playerName;

  if (!state.zones.length) {
    listEl.innerHTML = '<div class="s-empty">No zones defined yet.</div>';
    clearBtn.style.display = 'none';
  } else {
    clearBtn.style.display = 'block';
    listEl.innerHTML = state.zones.map(function(z) {
      var col = safeColor(z.color);
      return '<div class="s-zone-row">' +
        '<button class="s-zone-toggle" ' +
        'style="color:' + (z.active ? col : '#555') + ';border-color:' + (z.active ? col : '#2a2a3a') + '" ' +
        'onclick="settingsToggleZone(\'' + esc(z.id) + '\')">' + esc(z.name.toUpperCase()) + '</button>' +
        '<button class="s-zone-share" onclick="shareZone(\'' + esc(z.id) + '\')">&#x2191;</button>' +
        '<button class="s-zone-edit" onclick="settingsEditZone(\'' + esc(z.id) + '\')">&#9998;</button>' +
        '<button class="s-zone-del" onclick="settingsDeleteZone(\'' + esc(z.id) + '\')">&#10005;</button>' +
        '</div>';
    }).join('');
  }
}

function settingsAddZone()      { closeSettings(); startDrawing(); }
function settingsEditZone(id)   { closeSettings(); startEditZone(id); }
function settingsToggleZone(id) { toggleZoneActive(id); renderSettingsPanel(); }
function settingsDeleteZone(id) { deleteZone(id);       renderSettingsPanel(); }
function settingsClearZones() {
  if (!confirm('Delete all ' + state.zones.length + ' zone' + (state.zones.length !== 1 ? 's' : '') + '?')) return;
  clearAllZones();
  renderSettingsPanel();
}

function openAdjust() {
  closeSettings();
  document.getElementById('adjust-overlay').classList.add('open');
}

function closeAdjust() {
  document.getElementById('adjust-overlay').classList.remove('open');
}

function adjustGrid(dlng, dlat) {
  gridOffsetLat += dlat * CELL_LAT_DEG / 4;
  gridOffsetLng += dlng * CELL_LNG_DEG / 4;
  localStorage.setItem('porter_grid_lat', gridOffsetLat);
  localStorage.setItem('porter_grid_lng', gridOffsetLng);
  renderGridCanvas();
  renderOrderMarkers();
}

// ── PAINT MODE ──────────────────────────────────────────────

var lastPaintHexKey = null;

function startPainting(zoneId) {
  var zone = state.zones.find(function(z) { return z.id === zoneId; });
  if (!zone) return;
  state.painting    = true;
  state.paintZoneId = zoneId;
  lastPaintHexKey   = null;
  if (state.userPos) {
    var h = latLngToHex(state.userPos.lat, state.userPos.lng);
    lastPaintHexKey = hexKey(h.q, h.r);
    paintHex(h.q, h.r);
  }
}

function stopPainting() {
  if (!state.painting) return;
  var zoneId = state.paintZoneId;
  state.painting    = false;
  state.paintZoneId = null;
  lastPaintHexKey   = null;
  if (state.phase === 'active') {
    var zone = state.zones.find(function(z) { return z.id === zoneId; });
    if (zone) { generateOrdersForZone(zone); saveGameState(); renderOrderMarkers(); }
  }
}

function paintHex(q, r) {
  var zone = state.zones.find(function(z) { return z.id === state.paintZoneId; });
  if (!zone) { stopPainting(); return; }
  var k = hexKey(q, r);
  if (zone.cells.some(function(c) { return hexKey(c.q, c.r) === k; })) return;
  zone.cells.push({ q: q, r: r });
  saveZones();
  renderGridCanvas();
}

function savePlayerName(val) {
  state.playerName = val.trim();
  localStorage.setItem('porter_name', state.playerName);
}

function shareZone(id) {
  var zone = state.zones.find(function(z) { return z.id === id; });
  if (!zone) return;
  var absCells = (zone.cells || []).map(function(c) { return hexCenter(c.q, c.r); });
  var shareZoneData = { name: zone.name, color: zone.color, active: zone.active, cells: absCells };
  var payload = JSON.stringify({ version: 1, type: 'zone', zone: shareZoneData }, null, 2);
  var filename = zone.name.replace(/[^a-zA-Z0-9_-]/g, '_') + '.porter';
  if (typeof navigator.share === 'function' && typeof navigator.canShare === 'function') {
    var file = new File([payload], filename, { type: 'application/json' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'Porter Zone: ' + zone.name }).catch(function() {});
      return;
    }
  }
  var blob = new Blob([payload], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function shareProfile() {
  var name = state.playerName || 'Anonymous';
  var text = 'PORTER · ' + name.toUpperCase() + '\nScore: ' + state.score + ' pts';
  if (typeof navigator.share === 'function') {
    navigator.share({ title: 'Porter Score', text: text }).catch(function() {});
    return;
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { alert('Copied to clipboard!'); });
  }
}

// ═══════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════

function exportData() {
  var data = {
    version:      1,
    exported:     new Date().toISOString(),
    score:        state.score,
    deliveries:   state.deliveries,
    sessionDist:  state.sessionDist,
    zones:        state.zones,
    packages:     state.packages,
    destinations: state.destinations,
    carrying:     state.carrying,
    cellLngDeg:   CELL_LNG_DEG,
    gridOffsetLat: gridOffsetLat,
    gridOffsetLng: gridOffsetLng,
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'porter_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);

      // Single-zone share file
      if (data.version && data.type === 'zone' && data.zone) {
        var z = data.zone;
        var incoming = {
          id:     'zone_' + Date.now() + '_0',
          name:   String(z.name  || 'Shared Zone').slice(0, 40),
          color:  safeColor(z.color),
          active: z.active !== false,
          cells:  (z.cells || []).map(function(c) { return latLngToHex(c.lat, c.lng); }),
        };
        state.zones.push(incoming);
        saveZones();
        renderZoneMarkers(); renderGridCanvas(); renderSettingsPanel(); updateHUD();
        input.value = ''; return;
      }

      if (!data.version || !Array.isArray(data.zones)) throw new Error('Unrecognized file format.');
      if (!confirm('Import will replace all current data. Continue?')) { input.value = ''; return; }

      state.score        = data.score        || 0;
      state.deliveries   = data.deliveries   || 0;
      state.sessionDist  = data.sessionDist  || 0;
      state.zones        = data.zones        || [];
      state.packages     = data.packages     || [];
      state.destinations = data.destinations || [];
      state.carrying     = data.carrying     || [];
      if (data.cellLngDeg) CELL_LNG_DEG = data.cellLngDeg;
      if (data.gridOffsetLat != null) gridOffsetLat = data.gridOffsetLat;
      if (data.gridOffsetLng != null) gridOffsetLng = data.gridOffsetLng;

      localStorage.setItem('porter_score',        state.score);
      localStorage.setItem('porter_deliveries',   state.deliveries);
      localStorage.setItem('porter_session_dist', state.sessionDist);
      if (data.cellLngDeg) localStorage.setItem('porter_cell_lng', CELL_LNG_DEG);
      if (data.gridOffsetLat != null) localStorage.setItem('porter_grid_lat', gridOffsetLat);
      if (data.gridOffsetLng != null) localStorage.setItem('porter_grid_lng', gridOffsetLng);
      saveZones();
      saveGameState();

      renderZoneMarkers();
      renderGridCanvas();
      renderOrderMarkers();
      renderSettingsPanel();
      updateHUD();
      input.value = '';
    } catch (err) {
      alert('Import failed: ' + err.message);
      input.value = '';
    }
  };
  reader.readAsText(file);
}

function resetProfile() {
  if (!confirm('Reset all data? This will permanently delete your score, zones, and inventory.')) return;
  if (!confirm('Are you sure? This cannot be undone.')) return;

  ['porter_score','porter_deliveries','porter_session_dist',
   'porter_zones','porter_packages','porter_destinations','porter_carrying','porter_cell_lng',
   'porter_grid_lat','porter_grid_lng']
    .forEach(function(k) { localStorage.removeItem(k); });

  state.score        = 0;
  state.deliveries   = 0;
  state.sessionDist  = 0;
  state.lastPos      = null;
  state.zones        = [];
  state.packages     = [];
  state.destinations = [];
  state.carrying = [];
  if (state.userPos) {
    CELL_LNG_DEG = CELL_LAT_DEG / Math.cos(state.userPos.lat * Math.PI / 180);
    localStorage.setItem('porter_cell_lng', CELL_LNG_DEG);
  } else {
    CELL_LNG_DEG = CELL_LAT_DEG;
  }
  gridOffsetLat = 0; gridOffsetLng = 0;

  closeSettings();
  renderZoneMarkers();
  renderGridCanvas();
  renderOrderMarkers();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  ZONE MANAGEMENT
// ═══════════════════════════════════════════════════════════

function removeZoneOrders(zone, removeDrops) {
  if (!zone.cells || !zone.cells.length) return;
  var zoneKeys = new Set(zone.cells.map(function(c) { return hexKey(c.q, c.r); }));

  var removedIds = new Set();
  state.packages = state.packages.filter(function(p) {
    var h = latLngToHex(p.pickupLoc.lat, p.pickupLoc.lng);
    if (zoneKeys.has(hexKey(h.q, h.r))) { removedIds.add(p.id); return false; }
    return true;
  });
  if (removeDrops) {
    var removedDestIds = new Set();
    state.destinations = state.destinations.filter(function(d) {
      var h = latLngToHex(d.loc.lat, d.loc.lng);
      if (zoneKeys.has(hexKey(h.q, h.r))) { removedDestIds.add(d.id); return false; }
      return true;
    });
    state.packages = state.packages.filter(function(p) {
      if (removedDestIds.has(p.destId)) { removedIds.add(p.id); return false; }
      return true;
    });
  }
  state.carrying = state.carrying.filter(function(cid) { return !removedIds.has(cid); });
}

function generateOrdersForZone(zone) {
  if (!zone.active) return;
  var activeZones = state.zones.filter(function(z) {
    return z.active && ((z.cells && z.cells.length) || (z.polygon && z.polygon.length >= 3));
  });

  var counts    = orderCounts(activeZones);
  var needDests = Math.max(0, counts.dests - state.destinations.length);
  var needPkgs  = Math.max(0, counts.pkgs  - state.packages.length);
  if (needDests === 0 && needPkgs === 0) return;

  var occupied = new Set();
  state.packages.forEach(function(p) {
    var h = latLngToHex(p.pickupLoc.lat, p.pickupLoc.lng);
    occupied.add(hexKey(h.q, h.r));
  });
  state.destinations.forEach(function(d) {
    var h = latLngToHex(d.loc.lat, d.loc.lng);
    occupied.add(hexKey(h.q, h.r));
  });

  spawnOrders(activeZones, needDests, needPkgs, occupied);
}

function toggleZoneActive(id) {
  var z = state.zones.find(function(z) { return z.id === id; });
  if (!z) return;
  if (z.active) {
    if (z.cells && z.cells.length) {
      var zk = new Set(z.cells.map(function(c) { return hexKey(c.q, c.r); }));
      var cc = state.carrying.filter(function(cid) {
        var p = state.packages.find(function(p) { return p.id === cid; });
        if (!p) return false;
        var h = latLngToHex(p.pickupLoc.lat, p.pickupLoc.lng);
        return zk.has(hexKey(h.q, h.r));
      }).length;
      if (cc > 0 && !confirm(cc + ' carried package' + (cc > 1 ? 's' : '') + ' from this zone will be deleted. Disable zone?')) return;
    }
    z.active = false;
    removeZoneOrders(z, false);
  } else {
    z.active = true;
    if (state.phase === 'active') generateOrdersForZone(z);
  }
  saveZones(); saveGameState(); renderZoneMarkers(); renderOrderMarkers(); updateHUD();
}

function deleteZone(id) {
  var z = state.zones.find(function(z) { return z.id === id; });
  if (!z || !confirm('Delete zone "' + z.name + '"?')) return;
  removeZoneOrders(z, true);
  state.zones = state.zones.filter(function(z) { return z.id !== id; });
  saveZones(); saveGameState(); renderZoneMarkers(); renderOrderMarkers(); updateHUD();
}

function clearAllZones() {
  state.zones = []; state.packages = []; state.destinations = []; state.carrying = [];
  saveZones(); saveGameState(); renderZoneMarkers(); renderOrderMarkers(); updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════

var drawCanvas, drawCtx;

function initDrawCanvas() {
  var dpr = window.devicePixelRatio || 1;
  var W   = window.innerWidth, H = window.innerHeight;
  drawCanvas = document.getElementById('draw-canvas');
  drawCanvas.width  = W * dpr;  drawCanvas.height = H * dpr;
  drawCanvas.style.width = W + 'px'; drawCanvas.style.height = H + 'px';
  drawCtx = drawCanvas.getContext('2d');
  drawCtx.scale(dpr, dpr);
}

window.addEventListener('resize', function() { initDrawCanvas(); renderGridCanvas(); });

// ═══════════════════════════════════════════════════════════
//  HEX GRID SYSTEM  (flat-top axial q,r coordinates)
// ═══════════════════════════════════════════════════════════
// Hex circumradius = CELL_LAT_DEG (~20 m). Flat-top means the
// top/bottom edges are horizontal. Neighbor directions:
//   NE(+1,0), N(0,+1), NW(-1,+1), SW(-1,0), S(0,-1), SE(+1,-1)
// Edge i (vertex i → vertex i+1) is shared with HEX_NEIGHBORS[i].

var SQ3 = Math.sqrt(3);
var HEX_NEIGHBORS = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];

function hexRound(qf, rf) {
  var sf = -qf - rf;
  var q = Math.round(qf), r = Math.round(rf), s = Math.round(sf);
  var dq = Math.abs(q - qf), dr = Math.abs(r - rf), ds = Math.abs(s - sf);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return { q: q, r: r };
}

function latLngToHex(lat, lng) {
  var nx = (lng - gridOffsetLng) / CELL_LNG_DEG, ny = (lat - gridOffsetLat) / CELL_LAT_DEG;
  return hexRound(2/3 * nx, -1/3 * nx + SQ3/3 * ny);
}

function hexCenter(q, r) {
  return {
    lat: (SQ3/2 * q + SQ3 * r) * CELL_LAT_DEG + gridOffsetLat,
    lng: (3/2 * q)              * CELL_LNG_DEG + gridOffsetLng,
  };
}

function hexKey(q, r) { return q + ',' + r; }

function hexVerticesPx(q, r) {
  var verts = [];
  for (var i = 0; i < 6; i++) {
    var angle = Math.PI / 3 * i;
    var lat = (SQ3/2 * q + SQ3 * r + Math.sin(angle)) * CELL_LAT_DEG + gridOffsetLat;
    var lng = (3/2 * q              + Math.cos(angle)) * CELL_LNG_DEG + gridOffsetLng;
    verts.push(map.latLngToContainerPoint([lat, lng]));
  }
  return verts;
}

function hexOnScreen(verts) {
  var W = window.innerWidth, H = window.innerHeight;
  return verts.some(function(v) { return v.x >= -4 && v.x <= W + 4 && v.y >= -4 && v.y <= H + 4; });
}

function toggleCell(latlng) {
  var h   = latLngToHex(latlng.lat, latlng.lng);
  var key = hexKey(h.q, h.r);
  if (state.gridCells.has(key)) state.gridCells.delete(key);
  else                           state.gridCells.add(key);
  renderGridCanvas();
  updateHUD();
}

function findConnectedComponents(cellSet) {
  var visited = new Set(), comps = [];
  cellSet.forEach(function(startKey) {
    if (visited.has(startKey)) return;
    var comp = new Set(), queue = [startKey];
    visited.add(startKey); comp.add(startKey);
    while (queue.length) {
      var key = queue.shift(), parts = key.split(',');
      var q = parseInt(parts[0]), r = parseInt(parts[1]);
      HEX_NEIGHBORS.forEach(function(d) {
        var nk = hexKey(q + d[0], r + d[1]);
        if (cellSet.has(nk) && !visited.has(nk)) { visited.add(nk); comp.add(nk); queue.push(nk); }
      });
    }
    comps.push(comp);
  });
  return comps;
}

function renderZoneCells(cells, color, fillOpacity, strokeOpacity) {
  var cellSet = new Set(cells.map(function(c) { return hexKey(c.q, c.r); }));
  drawCtx.fillStyle = color; drawCtx.strokeStyle = color; drawCtx.lineWidth = 1.5;

  drawCtx.globalAlpha = fillOpacity;
  drawCtx.beginPath();
  cells.forEach(function(c) {
    var verts = hexVerticesPx(c.q, c.r);
    if (!hexOnScreen(verts)) return;
    drawCtx.moveTo(verts[0].x, verts[0].y);
    for (var i = 1; i < 6; i++) drawCtx.lineTo(verts[i].x, verts[i].y);
    drawCtx.closePath();
  });
  drawCtx.fill();

  drawCtx.globalAlpha = strokeOpacity;
  drawCtx.beginPath();
  cells.forEach(function(c) {
    var verts = hexVerticesPx(c.q, c.r);
    if (!hexOnScreen(verts)) return;
    for (var e = 0; e < 6; e++) {
      if (!cellSet.has(hexKey(c.q + HEX_NEIGHBORS[e][0], c.r + HEX_NEIGHBORS[e][1]))) {
        drawCtx.moveTo(verts[e].x, verts[e].y);
        drawCtx.lineTo(verts[(e + 1) % 6].x, verts[(e + 1) % 6].y);
      }
    }
  });
  drawCtx.stroke();
  drawCtx.globalAlpha = 1.0;
}

var _rafPending = false;
function scheduleGridRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(function() { _rafPending = false; renderGridCanvas(); });
}


function renderGridCanvas() {
  if (!drawCtx) return;
  drawCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  var editingId = state.drawing ? state.editingZoneId : null;
  var fillOp   = state.drawing ? 0.18 : 0.1;
  var strokeOp = state.drawing ? 0.9  : 0.7;

  state.zones.forEach(function(zone) {
    if (!zone.cells || !zone.cells.length || !zone.active) return;
    if (zone.id === editingId) return; // replaced by gridCells below
    renderZoneCells(zone.cells, zone.color, fillOp, strokeOp);
  });

  if (state.drawing && state.gridCells && state.gridCells.size) {
    var editZone = editingId ? state.zones.find(function(z) { return z.id === editingId; }) : null;
    var color    = editZone ? editZone.color : ZONE_COLORS[state.zones.length % ZONE_COLORS.length];
    var cells    = Array.from(state.gridCells).map(function(key) {
      var p = key.split(',');
      return { q: parseInt(p[0]), r: parseInt(p[1]) };
    });
    renderZoneCells(cells, color, 0.25, 1.0);
  }

}

map.on('move zoom', scheduleGridRender);
map.on('zoomend',  renderOrderMarkers);
map.on('dragstart', function() {
  if (state.following) {
    state.following = false;
    document.getElementById('follow-btn').classList.remove('active');
  }
});

map.on('click', function(e) {
  if (!state.drawing) return;
  toggleCell(e.latlng);
});

function startDrawing() {
  stopPainting();
  state.drawing   = true;
  state.gridCells = new Set();
  renderOrderMarkers();
  renderGridCanvas();
  updateHUD();
}

function cancelDraw() {
  state.drawing       = false;
  state.gridCells     = null;
  state.editingZoneId = null;
  renderGridCanvas();
  renderOrderMarkers();
  updateHUD();
}

function finishDraw() {
  if (!state.drawing || !state.gridCells || !state.gridCells.size) return;
  if (state.editingZoneId) { finishEdit(); return; }
  state.drawing = false;

  var comps    = findConnectedComponents(state.gridCells);
  var baseName = prompt('Zone name (leave blank to auto-name):');
  if (baseName === null) { state.gridCells = null; renderGridCanvas(); updateHUD(); return; }
  baseName = baseName.trim();

  var newZones = [];
  comps.forEach(function(comp, idx) {
    var cells = Array.from(comp).map(function(key) {
      var p = key.split(',');
      return { q: parseInt(p[0]), r: parseInt(p[1]) };
    });
    var name  = baseName || ('Zone ' + (state.zones.length + 1));
    if (comps.length > 1) name += ' ' + (idx + 1);
    var color = ZONE_COLORS[state.zones.length % ZONE_COLORS.length];
    var z = { id: 'zone_' + Date.now() + '_' + idx, name: name, color: color, cells: cells, active: true };
    state.zones.push(z);
    newZones.push(z);
  });

  state.gridCells = null;
  saveZones();
  renderGridCanvas();
  if (state.phase === 'active') {
    newZones.forEach(function(z) { generateOrdersForZone(z); });
    saveGameState();
    renderOrderMarkers();
  }
  if (state.zones.length === newZones.length) {
    showToast('Tip: Tap ◎ → choose a zone to paint it as you walk', 5000);
  }
  updateHUD();
}

function startEditZone(id) {
  var zone = state.zones.find(function(z) { return z.id === id; });
  if (!zone) return;
  state.drawing       = true;
  state.editingZoneId = id;
  state.gridCells     = new Set(zone.cells ? zone.cells.map(function(c) { return hexKey(c.q, c.r); }) : []);
  renderOrderMarkers();
  renderGridCanvas();
  updateHUD();
}

function finishEdit() {
  var zone = state.zones.find(function(z) { return z.id === state.editingZoneId; });
  if (!zone || !state.gridCells || !state.gridCells.size) return;

  var oldKeys = new Set(zone.cells ? zone.cells.map(function(c) { return hexKey(c.q, c.r); }) : []);
  var newKeys = new Set(state.gridCells);

  // Remove orders on cells that are no longer in the zone
  var removedKeys = new Set();
  oldKeys.forEach(function(k) { if (!newKeys.has(k)) removedKeys.add(k); });
  if (removedKeys.size > 0) {
    var removedPkgIds = new Set();
    state.packages = state.packages.filter(function(p) {
      var h = latLngToHex(p.pickupLoc.lat, p.pickupLoc.lng);
      if (removedKeys.has(hexKey(h.q, h.r))) { removedPkgIds.add(p.id); return false; }
      return true;
    });
    var removedDestIds = new Set();
    state.destinations = state.destinations.filter(function(d) {
      var h = latLngToHex(d.loc.lat, d.loc.lng);
      if (removedKeys.has(hexKey(h.q, h.r))) { removedDestIds.add(d.id); return false; }
      return true;
    });
    state.packages = state.packages.filter(function(p) {
      if (removedDestIds.has(p.destId)) { removedPkgIds.add(p.id); return false; }
      return true;
    });
    state.carrying = state.carrying.filter(function(id) { return !removedPkgIds.has(id); });
  }

  // Handle disconnected components: first updates the edited zone, rest become new zones
  var comps = findConnectedComponents(newKeys);
  zone.cells = Array.from(comps[0]).map(function(key) {
    var p = key.split(',');
    return { q: parseInt(p[0]), r: parseInt(p[1]) };
  });
  var splitZones = [];
  for (var i = 1; i < comps.length; i++) {
    var cells = Array.from(comps[i]).map(function(key) {
      var p = key.split(',');
      return { q: parseInt(p[0]), r: parseInt(p[1]) };
    });
    var nz = { id: 'zone_' + Date.now() + '_' + i, name: zone.name + ' ' + (i + 1), color: zone.color, cells: cells, active: zone.active };
    state.zones.push(nz);
    splitZones.push(nz);
  }

  state.editingZoneId = null;
  state.drawing       = false;
  state.gridCells     = null;

  saveZones();
  if (state.phase === 'active' && zone.active) {
    generateOrdersForZone(zone);
    splitZones.forEach(function(nz) { generateOrdersForZone(nz); });
    saveGameState();
  }
  renderGridCanvas();
  renderZoneMarkers();
  renderOrderMarkers();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  ZONE RENDERING  (legacy polygon zones via Leaflet only)
// ═══════════════════════════════════════════════════════════

function renderZoneMarkers() {
  zoneMarkers.forEach(function(m) { map.removeLayer(m); });
  zoneMarkers = [];
  state.zones.forEach(function(zone) {
    if (zone.cells) return;
    if (!zone.polygon || zone.polygon.length < 3 || !zone.active) return;
    var latlngs = zone.polygon.map(function(p) { return [p.lat, p.lng]; });
    var poly = L.polygon(latlngs, {
      color: zone.color, weight: 2, opacity: 0.7,
      fillColor: zone.color, fillOpacity: 0.08, interactive: false,
    }).addTo(map);
    zoneMarkers.push(poly);
  });
  renderGridCanvas();
}

// ═══════════════════════════════════════════════════════════
//  GEOMETRY
// ═══════════════════════════════════════════════════════════

function pointInPolygon(pt, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i].lng, yi = polygon[i].lat;
    var xj = polygon[j].lng, yj = polygon[j].lat;
    if (((yi > pt.lat) !== (yj > pt.lat)) &&
        (pt.lng < (xj - xi) * (pt.lat - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function randomPointInZone(zone, occupied) {
  occupied = occupied || new Set();
  if (zone.cells && zone.cells.length) {
    var free = zone.cells.filter(function(c) { return !occupied.has(hexKey(c.q, c.r)); });
    if (!free.length) return null;
    var c = free[Math.floor(Math.random() * free.length)];
    occupied.add(hexKey(c.q, c.r));
    return hexCenter(c.q, c.r);
  }
  if (!zone.polygon || zone.polygon.length < 3) return null;
  var poly = zone.polygon;
  var lats = poly.map(function(p) { return p.lat; }), lngs = poly.map(function(p) { return p.lng; });
  var minLat = Math.min.apply(null, lats), maxLat = Math.max.apply(null, lats);
  var minLng = Math.min.apply(null, lngs), maxLng = Math.max.apply(null, lngs);
  for (var i = 0; i < 200; i++) {
    var lat = minLat + Math.random() * (maxLat - minLat);
    var lng = minLng + Math.random() * (maxLng - minLng);
    if (pointInPolygon({ lat: lat, lng: lng }, poly)) {
      var h = latLngToHex(lat, lng), hk = hexKey(h.q, h.r);
      if (!occupied.has(hk)) {
        occupied.add(hk);
        return hexCenter(h.q, h.r);
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
//  ORDER GENERATION
// ═══════════════════════════════════════════════════════════

function orderCounts(activeZones) {
  var totalHexes = activeZones.reduce(function(sum, z) {
    return sum + (z.cells ? z.cells.length : 0);
  }, 0);
  var pkgs  = Math.max(2, Math.round(totalHexes / 7));
  var dests = Math.max(2, Math.round(pkgs / 3));
  return { pkgs: pkgs, dests: dests };
}

function spawnOrders(active, needDests, needPkgs, occupied) {
  var weightPool = [1, 1, 2, 2, 3];
  for (var i = 0; i < needDests; i++) {
    var dz = active[Math.floor(Math.random() * active.length)];
    var pt = randomPointInZone(dz, occupied);
    if (!pt) continue;
    var hd = latLngToHex(pt.lat, pt.lng);
    occupied.add(hexKey(hd.q, hd.r));
    state.destinations.push({
      id: 'dest_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      loc: pt, label: nextDropLabel(),
      deliveries: 0, level: 0, name: randomDropName(),
      contributions: []
    });
  }
  if (!state.destinations.length) return false;

  var allDests = state.destinations;
  for (var j = 0; j < needPkgs; j++) {
    var pz  = active[Math.floor(Math.random() * active.length)];
    var pt2 = randomPointInZone(pz, occupied);
    if (!pt2) continue;
    var dest   = allDests[j % allDests.length];
    var weight = weightPool[Math.floor(Math.random() * weightPool.length)];
    var dist   = haversine(pt2, dest.loc);
    state.packages.push({
      id: 'pkg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7), pickupLoc: pt2, destId: dest.id,
      dist: dist, pts: Math.round(dist * WEIGHT[weight].multiplier),
      weight: weight, picked: false,
      item: PACKAGE_ITEMS[Math.floor(Math.random() * PACKAGE_ITEMS.length)]
    });
  }
  return true;
}

function generateOrders() {
  var active = state.zones.filter(function(z) {
    return z.active && ((z.cells && z.cells.length) || (z.polygon && z.polygon.length >= 3));
  });
  if (!active.length) { updateHUD(); return; }

  // Migrate existing destinations without drop data
  state.destinations.forEach(function(d) {
    if (d.deliveries == null) d.deliveries = 0;
    if (d.level      == null) d.level      = 0;
    if (!d.name)               d.name      = randomDropName();
    if (!d.contributions) {
      d.contributions = d.deliveries > 0
        ? [{ userId: state.userId, userName: state.playerName || 'Anonymous', deliveries: d.deliveries }]
        : [];
    }
  });

  // Keep carried packages; discard undelivered ones (they will respawn)
  state.packages = state.packages.filter(function(p) { return state.carrying.includes(p.id); });
  // Drops (destinations) are permanent — never cleared here

  var occupied = new Set();
  state.packages.forEach(function(p) {
    var h = latLngToHex(p.pickupLoc.lat, p.pickupLoc.lng);
    occupied.add(hexKey(h.q, h.r));
  });
  state.destinations.forEach(function(d) {
    var h = latLngToHex(d.loc.lat, d.loc.lng);
    occupied.add(hexKey(h.q, h.r));
  });

  var counts    = orderCounts(active);
  var needDests = Math.max(0, counts.dests - state.destinations.length);
  var needPkgs  = Math.max(0, counts.pkgs  - state.packages.length);

  if (!spawnOrders(active, needDests, needPkgs, occupied)) {
    if (!refreshTimer) {
      refreshTimer = setTimeout(function() { refreshTimer = null; generateOrders(); }, 30000);
    }
    updateHUD(); return;
  }
  if (refreshTimer) { clearTimeout(refreshTimer); refreshTimer = null; }
  saveGameState();
  renderOrderMarkers();
  updateHUD();
}

function checkRefresh() {
  var available = state.packages.filter(function(p) { return !p.picked; }).length;
  if (available === 0 && state.carrying.length === 0) generateOrders();
}

// ═══════════════════════════════════════════════════════════
//  PROXIMITY
// ═══════════════════════════════════════════════════════════

function nearestPickable() {
  if (!state.userPos) return null;
  var rem   = getCapacity() - currentLoad();
  var cands = state.packages.filter(function(p) {
    return !p.picked && p.weight <= rem && haversine(state.userPos, p.pickupLoc) <= PROXIMITY_M;
  });
  if (!cands.length) return null;
  return cands.reduce(function(b, p) { return haversine(state.userPos, p.pickupLoc) < haversine(state.userPos, b.pickupLoc) ? p : b; });
}

function overweightInRange() {
  if (!state.userPos) return [];
  var rem = getCapacity() - currentLoad();
  return state.packages.filter(function(p) {
    return !p.picked && p.weight > rem && haversine(state.userPos, p.pickupLoc) <= PROXIMITY_M;
  });
}

function nearestDeliverable() {
  if (!state.userPos || !state.carrying.length) return null;
  var cands = state.destinations.filter(function(d) {
    var has = state.carrying.some(function(id) {
      var p = state.packages.find(function(p) { return p.id === id; });
      return p && p.destId === d.id;
    });
    return has && haversine(state.userPos, d.loc) <= PROXIMITY_M;
  });
  if (!cands.length) return null;
  return cands.reduce(function(b, d) { return haversine(state.userPos, d.loc) < haversine(state.userPos, b.loc) ? d : b; });
}

// ═══════════════════════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════════════════════

function attemptPickup() {
  var pkg = nearestPickable();
  if (!pkg) return;
  pkg.picked = true;
  state.carrying.push(pkg.id);
  vibrate(60);
  saveGameState();
  checkRefresh(); renderOrderMarkers(); updateHUD();
}

function spawnPackagesForDrop(dest) {
  var active = state.zones.filter(function(z) {
    return z.active && ((z.cells && z.cells.length) || (z.polygon && z.polygon.length >= 3));
  });
  if (!active.length) return;
  var occupied = new Set();
  state.packages.forEach(function(p) {
    var h = latLngToHex(p.pickupLoc.lat, p.pickupLoc.lng);
    occupied.add(hexKey(h.q, h.r));
  });
  state.destinations.forEach(function(d) {
    var h = latLngToHex(d.loc.lat, d.loc.lng);
    occupied.add(hexKey(h.q, h.r));
  });
  var weightPool = [1, 1, 2, 2, 3];
  var count = 1 + (Math.random() < 0.4 ? 1 : 0);
  for (var i = 0; i < count; i++) {
    var pz  = active[Math.floor(Math.random() * active.length)];
    var pt  = randomPointInZone(pz, occupied);
    if (!pt) continue;
    var h = latLngToHex(pt.lat, pt.lng);
    occupied.add(hexKey(h.q, h.r));
    var weight = weightPool[Math.floor(Math.random() * weightPool.length)];
    var dist   = haversine(pt, dest.loc);
    state.packages.push({
      id: 'pkg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      pickupLoc: pt, destId: dest.id,
      dist: dist, pts: Math.round(dist * WEIGHT[weight].multiplier),
      weight: weight, picked: false,
      item: PACKAGE_ITEMS[Math.floor(Math.random() * PACKAGE_ITEMS.length)]
    });
  }
}

function attemptDeliver() {
  var dest = nearestDeliverable();
  if (!dest) return;
  var pkgs     = state.packages.filter(function(p) { return state.carrying.includes(p.id) && p.destId === dest.id; });
  var basePts  = pkgs.reduce(function(s, p) { return s + p.pts; }, 0);
  var ids      = pkgs.map(function(p) { return p.id; });
  var capBefore = getCapacity();

  var level    = dest.level || 0;
  var bonusPts = Math.round(basePts * level / 100);
  var pts      = basePts + bonusPts;

  state.carrying = state.carrying.filter(function(id) { return !ids.includes(id); });
  state.packages = state.packages.filter(function(p)  { return !ids.includes(p.id); });
  // Drop stays — update per-user contribution and recalculate level from total
  if (!dest.contributions) dest.contributions = [];
  var myContrib = dest.contributions.find(function(c) { return c.userId === state.userId; });
  if (!myContrib) {
    myContrib = { userId: state.userId, userName: state.playerName || 'Anonymous', deliveries: 0 };
    dest.contributions.push(myContrib);
  }
  myContrib.deliveries += pkgs.length;
  myContrib.userName = state.playerName || 'Anonymous';
  dest.deliveries = (dest.deliveries || 0) + pkgs.length;
  dest.level = calcDropLevel(getDropTotalDeliveries(dest));

  state.score      += pts;
  state.deliveries += pkgs.length;
  state.streak      = (state.streak || 0) + 1;
  var capUp = getCapacity() > capBefore;
  localStorage.setItem('porter_score',      state.score);
  localStorage.setItem('porter_deliveries', state.deliveries);
  vibrate(capUp ? [50, 30, 50, 30, 100] : [80, 40, 120]);
  spawnPackagesForDrop(dest);
  saveGameState();
  showCompletion(pts, pkgs.length, dest.label, capUp, state.streak, level, bonusPts);
  renderOrderMarkers(); updateHUD();
}

function abandonPackage(id) {
  var p = state.packages.find(function(p) { return p.id === id; });
  if (!p) return;
  var dest = state.destinations.find(function(d) { return d.id === p.destId; });
  var wcfg = WEIGHT[p.weight];
  if (!confirm('Abandon ' + wcfg.label.toLowerCase() + ' package for Drop ' + (dest ? dest.label : '?') + ' (' + p.pts + ' pts)? It will not be reassigned.')) return;
  state.carrying = state.carrying.filter(function(cid) { return cid !== id; });
  state.packages = state.packages.filter(function(p)   { return p.id  !== id; });
  // Drops are permanent — never removed on abandon
  state.streak = 0;
  saveGameState();
  checkRefresh();
  renderOrderMarkers();
  updateHUD();
}

function shareDrop(destId) {
  var dest = state.destinations.find(function(d) { return d.id === destId; });
  if (!dest) return;
  var data = {
    v: 1,
    dropId: dest.id,
    loc: dest.loc,
    name: dest.name,
    contributions: dest.contributions && dest.contributions.length
      ? dest.contributions
      : (dest.deliveries > 0 ? [{ userId: state.userId, userName: state.playerName || 'Anonymous', deliveries: dest.deliveries }] : [])
  };
  var code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  var text = 'PORTER DROP\n' + code;
  if (navigator.share) {
    navigator.share({ title: 'Porter Drop ' + dest.label, text: text }).catch(function() {
      navigator.clipboard.writeText(code).then(function() { showToast('Drop code copied! Send it to a friend — they tap ↓ SYNC to add this drop.'); });
    });
  } else {
    navigator.clipboard.writeText(code).then(function() {
      showToast('Drop code copied! Send it to a friend — they tap ↓ SYNC to add this drop.');
    }).catch(function() {
      prompt('Copy this drop code and send it to a friend. They tap ↓ SYNC to import it:', code);
    });
  }
}

function mergeDropContributions(dest, incoming) {
  if (!dest.contributions) dest.contributions = [];
  (incoming || []).forEach(function(c) {
    if (!c.userId) return;
    var local = dest.contributions.find(function(x) { return x.userId === c.userId; });
    if (local) {
      local.deliveries = Math.max(local.deliveries || 0, c.deliveries || 0);
      if (c.userName) local.userName = c.userName;
    } else {
      dest.contributions.push({ userId: c.userId, userName: c.userName || 'Anonymous', deliveries: c.deliveries || 0 });
    }
  });
  dest.level = calcDropLevel(getDropTotalDeliveries(dest));
}

function importDropCode(code) {
  try {
    code = code.trim();
    if (code.indexOf('PORTER DROP\n') === 0) code = code.slice('PORTER DROP\n'.length);
    var data = JSON.parse(decodeURIComponent(escape(atob(code))));
    if (!data.v || !data.dropId || !data.loc) throw new Error('bad format');

    // Same drop already present → sync contributions
    var existing = state.destinations.find(function(d) { return d.id === data.dropId; });
    if (existing) {
      mergeDropContributions(existing, data.contributions);
      saveGameState();
      renderOrderMarkers();
      showToast('Drop synced! Level ' + existing.level);
      return;
    }

    // Different drop on same hex → reject
    var ih = latLngToHex(data.loc.lat, data.loc.lng);
    var ik = hexKey(ih.q, ih.r);
    if (state.destinations.some(function(d) {
      var h = latLngToHex(d.loc.lat, d.loc.lng);
      return hexKey(h.q, h.r) === ik;
    })) {
      showToast('A drop already exists at that location.', 4000);
      return;
    }

    // New drop
    var newDrop = {
      id: data.dropId, loc: data.loc,
      label: nextDropLabel(), name: data.name || 'Unknown',
      contributions: [], deliveries: 0, level: 0
    };
    mergeDropContributions(newDrop, data.contributions);
    state.destinations.push(newDrop);
    spawnPackagesForDrop(newDrop);
    saveGameState();
    renderOrderMarkers();
    updateHUD();
    showToast('Drop ' + newDrop.label + ' added! Level ' + newDrop.level);
  } catch (e) {
    showToast('Invalid drop code.', 4000);
  }
}

function importDropFromClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(function(text) {
      importDropCode(text);
    }).catch(function() {
      var code = prompt('Paste drop code:');
      if (code) importDropCode(code);
    });
  } else {
    var code = prompt('Paste drop code:');
    if (code) importDropCode(code);
  }
}

var dropPanelDestId = null;

function openDropPanel(destId) {
  var dest = state.destinations.find(function(d) { return d.id === destId; });
  if (!dest) return;
  dropPanelDestId = destId;

  var level      = dest.level || 0;
  var totalDel   = getDropTotalDeliveries(dest);
  var toNext     = level < 100 ? deliveriesToNextLevel(totalDel, level) : 0;
  var prevNeeded = level > 0 ? Math.ceil(Math.pow(1.1, level)) - 1 : 0;
  var nextNeeded = level < 100 ? Math.ceil(Math.pow(1.1, level + 1)) - 1 : totalDel;
  var pct = level >= 100 ? 100
    : (nextNeeded <= prevNeeded ? 100
    : Math.round((totalDel - prevNeeded) / (nextNeeded - prevNeeded) * 100));
  var pkgsWaiting = state.packages.filter(function(p) { return p.destId === destId && !p.picked; }).length;

  var contribHtml = '';
  if (dest.contributions && dest.contributions.length > 1) {
    contribHtml = '<div style="margin-bottom:14px">' +
      '<div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:8px">CONTRIBUTORS</div>' +
      dest.contributions.slice().sort(function(a, b) { return (b.deliveries || 0) - (a.deliveries || 0); }).map(function(c) {
        var isMe = c.userId === state.userId;
        return '<div style="display:flex;justify-content:space-between;font-size:11px;color:' + (isMe ? '#e0d8c8' : '#777') + ';letter-spacing:1px;margin-bottom:4px">' +
          '<span>' + esc(c.userName || 'Anonymous') + (isMe ? ' (you)' : '') + '</span>' +
          '<span>' + (c.deliveries || 0) + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  var btnStyle = 'padding:13px;border-radius:4px;font-family:\'Courier New\',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;border:1px solid';

  document.getElementById('drop-panel-content').innerHTML =
    '<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">' +
      '<div style="width:52px;height:52px;border-radius:50%;background:#0c1e30;border:2px solid #3080c0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#fff;font-family:\'Courier New\',monospace">' + esc(dest.label) + '</div>' +
      '<div>' +
        '<div style="font-size:14px;letter-spacing:3px;color:#e0d8c8">DROP ' + esc(dest.label) + '</div>' +
        '<div style="font-size:11px;color:#666;letter-spacing:2px;margin-top:3px">' + esc(dest.name || 'UNKNOWN') + '</div>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:24px;margin-bottom:14px">' +
      '<div><div style="font-size:10px;color:#555;letter-spacing:2px">LEVEL</div><div style="font-size:24px;color:#e8a030">' + level + '</div></div>' +
      '<div><div style="font-size:10px;color:#555;letter-spacing:2px">TOTAL DEL.</div><div style="font-size:24px;color:#e8a030">' + totalDel + '</div></div>' +
      '<div><div style="font-size:10px;color:#555;letter-spacing:2px">BONUS</div><div style="font-size:24px;color:#5ab05a">+' + level + '%</div></div>' +
    '</div>' +
    (level < 100
      ? '<div style="margin-bottom:14px">' +
          '<div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:6px">LEVEL ' + (level + 1) + ' IN ' + toNext + ' DELIVERIES</div>' +
          '<div style="height:4px;background:#1a1a2a;border-radius:2px"><div style="height:4px;background:#e8a030;border-radius:2px;width:' + Math.max(2, pct) + '%"></div></div>' +
        '</div>'
      : '<div style="font-size:11px;color:#5ab05a;letter-spacing:3px;margin-bottom:14px">MAX LEVEL</div>') +
    contribHtml +
    '<div style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:16px">' +
      pkgsWaiting + ' package' + (pkgsWaiting !== 1 ? 's' : '') + ' waiting' +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:4px">' +
      '<button onclick="shareDrop(\'' + destId + '\')" style="flex:1;' + btnStyle + ' #2a3a20;background:rgba(20,40,10,0.4);color:#5ab05a">&#x2191; SHARE</button>' +
      '<button onclick="importDropFromClipboard()" style="flex:1;' + btnStyle + ' #1a2a3a;background:rgba(10,20,40,0.4);color:#3080c0">&#x2193; SYNC</button>' +
    '</div>' +
    '<div style="font-size:10px;color:#556;letter-spacing:1px;margin-bottom:10px;text-align:center">SHARE sends a code · recipient taps SYNC to import</div>' +
    '<button onclick="deleteDropConfirm()" style="width:100%;' + btnStyle + ' #602020;background:rgba(60,10,10,0.4);color:#c04040">DELETE DROP</button>';

  document.getElementById('drop-overlay').classList.add('open');
  document.getElementById('drop-panel').classList.add('open');
}

function closeDrop() {
  document.getElementById('drop-overlay').classList.remove('open');
  document.getElementById('drop-panel').classList.remove('open');
  dropPanelDestId = null;
}

function deleteDropConfirm() {
  var dest = state.destinations.find(function(d) { return d.id === dropPanelDestId; });
  if (!dest) { closeDrop(); return; }
  if (!confirm('Delete Drop ' + dest.label + ' (' + esc(dest.name || '') + ') and erase all history? This cannot be undone.')) return;
  var idsToRemove = new Set(state.packages.filter(function(p) { return p.destId === dropPanelDestId; }).map(function(p) { return p.id; }));
  state.carrying     = state.carrying.filter(function(id) { return !idsToRemove.has(id); });
  state.packages     = state.packages.filter(function(p)  { return p.destId !== dropPanelDestId; });
  state.destinations = state.destinations.filter(function(d) { return d.id !== dropPanelDestId; });
  closeDrop();
  saveGameState();
  renderOrderMarkers();
  updateHUD();
}

function confirmRefresh() {
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirmModal() {
  document.getElementById('confirm-overlay').classList.remove('open');
}

function executeRefresh() {
  closeConfirmModal();
  state.packages = [];
  state.carrying = [];
  // Drops (destinations) are permanent — not cleared on refresh
  saveGameState();
  renderOrderMarkers();
  updateHUD();
  if (state.phase === 'active') generateOrders();
}

function showCompletion(pts, count, zoneLabel, capUp, streak, level, bonusPts) {
  var el = document.getElementById('completion-overlay');
  var km = (state.sessionDist / 1000).toFixed(2);
  document.getElementById('completion-pts').textContent   = '+' + pts;
  document.getElementById('completion-total').textContent =
    (count > 1 ? count + ' PKGS' : '1 PKG') +
    (zoneLabel ? ' · DROP ' + zoneLabel : '') +
    (bonusPts ? ' · +' + bonusPts + ' LVL' + (level || '') + ' BONUS' : '') +
    ' · SCORE: ' + state.score + ' · ' + km + 'km walked';
  var streakEl = document.getElementById('completion-streak');
  streakEl.style.display = streak > 1 ? 'block' : 'none';
  if (streak > 1) streakEl.textContent = 'STREAK × ' + streak;
  var levelEl = document.getElementById('completion-level');
  levelEl.style.display = capUp ? 'block' : 'none';
  if (capUp) levelEl.textContent = '⬆ CAPACITY UP TO ' + getCapacity() + 'U';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, capUp ? 3500 : 2800);
}

// ═══════════════════════════════════════════════════════════
//  ORDER MARKERS
// ═══════════════════════════════════════════════════════════

function clearMarkers() { orderMarkers.forEach(function(m) { map.removeLayer(m); }); orderMarkers = []; }

function renderOrderMarkers() {
  clearMarkers();
  if (state.drawing)            return;
  if (state.phase !== 'active') return;
  var pickable    = nearestPickable();
  var deliverable = nearestDeliverable();
  var rem         = getCapacity() - currentLoad();
  var iconPx      = Math.max(20, Math.round(getCellPixelWidth() * 0.95));
  if (userMarker) userMarker.setIcon(makeIcon('#1a3050', '🧍', iconPx));

  // Connection lines — added first so they land in overlayPane (below markerPane)
  state.packages.forEach(function(p) {
    var dest = state.destinations.find(function(d) { return d.id === p.destId; });
    if (!dest) return;
    var origin = p.picked && state.userPos ? state.userPos : p.pickupLoc;
    var line = L.polyline(
      [[origin.lat, origin.lng], [dest.loc.lat, dest.loc.lng]],
      { color: p.picked ? '#3080c0' : '#e8a030', weight: 1.5,
        opacity: p.picked ? 0.75 : 0.6, dashArray: '4 8',
        lineCap: 'round', interactive: false }
    ).addTo(map);
    orderMarkers.push(line);
  });

  state.packages.filter(function(p) { return !p.picked; }).forEach(function(p) {
    var dest     = state.destinations.find(function(d) { return d.id === p.destId; });
    var isNext   = pickable && pickable.id === p.id;
    var tooheavy = p.weight > rem;
    var cfg      = WEIGHT[p.weight];
    var m = L.marker([p.pickupLoc.lat, p.pickupLoc.lng], { icon: makePackageIcon(p.weight, iconPx, isNext, tooheavy) }).addTo(map);
    var tipLabel = p.item ? p.item + ' (' + cfg.label + ')' : cfg.label;
    m.bindTooltip(tipLabel + ' · → Drop ' + (dest ? dest.label : '?') + ' · ' + p.pts + ' pts' + (tooheavy ? ' · TOO HEAVY' : ''));
    orderMarkers.push(m);
  });

  state.destinations.forEach(function(d) {
    var n      = state.carrying.filter(function(id) {
      var p = state.packages.find(function(p) { return p.id === id; });
      return p && p.destId === d.id;
    }).length;
    var isNext = deliverable && deliverable.id === d.id;
    var destBg = isNext ? '#3080c0' : (n > 0 ? '#164060' : '#0c1e30');
    var m = L.marker([d.loc.lat, d.loc.lng], { icon: makeDestIcon(destBg, d.label, iconPx, d.level || 0) }).addTo(map);
    m.bindTooltip('Drop ' + d.label + (n > 0 ? ' · ' + n + ' to deliver' : '') + (d.level ? ' · Lv' + d.level : ''));
    (function(did) { m.on('click', function() { openDropPanel(did); }); })(d.id);
    orderMarkers.push(m);
  });
}

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

function updateHUD() {
  var statusEl = document.getElementById('mission-status');
  var detailEl = document.getElementById('mission-detail');
  var distEl   = document.getElementById('mission-distance');
  var scoreEl  = document.getElementById('score-value');
  var btn      = document.getElementById('action-btn');
  var secBtn   = document.getElementById('secondary-btn');

  scoreEl.textContent  = state.score;
  var capNow = getCapacity();
  var capEl  = document.getElementById('cap-progress');
  capEl.textContent = capNow < 12 ? 'CAP ' + capNow + ' · ' + (500 - state.score % 500) + ' TO ↑' : 'CAP MAX';
  btn.className        = ''; btn.onclick = null; btn.disabled = false;
  secBtn.style.display = 'none'; secBtn.onclick = null;
  document.getElementById('inventory').style.display = 'none';
  updateFollowBtn();

  // ── DRAWING / EDITING ────────────────────────────────────
  if (state.drawing) {
    var editing  = !!state.editingZoneId;
    var editZone = editing ? state.zones.find(function(z) { return z.id === state.editingZoneId; }) : null;
    statusEl.textContent = editing ? 'EDITING ' + (editZone ? editZone.name.toUpperCase() : 'ZONE') : 'SELECT AREA';
    detailEl.textContent = editing
      ? 'Tap cells to add or remove from zone. Pan freely.'
      : 'Tap squares to select your zone. Tap again to deselect. Pan freely.';
    var cellCount = state.gridCells ? state.gridCells.size : 0;
    distEl.textContent  = cellCount + ' cell' + (cellCount !== 1 ? 's' : '') + ' selected (~' + (cellCount * 400) + ' m²)';

    var hasCells = cellCount > 0;
    btn.className   = hasCells ? 'pickup ready' : 'generate';
    btn.textContent = editing ? 'SAVE ZONE' : 'FINISH ZONE';
    btn.disabled    = !hasCells;
    btn.onclick     = hasCells ? (editing ? finishEdit : finishDraw) : null;

    secBtn.style.display = 'block';
    secBtn.textContent   = 'CANCEL';
    secBtn.onclick       = cancelDraw;
    return;
  }

  // ── NO GPS ───────────────────────────────────────────────
  if (state.phase === 'no_gps') {
    statusEl.textContent = 'ACQUIRING GPS';
    detailEl.textContent = 'Acquiring GPS lock…';
    distEl.textContent   = '';
    btn.className = 'generate'; btn.textContent = 'WAITING FOR GPS'; btn.disabled = true;
    return;
  }

  // ── NO ACTIVE ZONES ───────────────────────────────────────
  if (!state.zones.filter(function(z) { return z.active; }).length) {
    statusEl.textContent = 'NO ZONES';
    detailEl.textContent = state.zones.length
      ? 'All zones inactive. Open settings to enable some.'
      : 'No zones defined. Open settings to add your play area.';
    distEl.textContent = '';
    btn.className = 'draw'; btn.textContent = 'OPEN SETTINGS'; btn.onclick = openSettings;
    return;
  }

  // ── ACTIVE GAMEPLAY ───────────────────────────────────────
  var load = currentLoad(), cap = getCapacity(), km = (state.sessionDist / 1000).toFixed(2);
  statusEl.textContent = 'LOAD ' + load + ' / ' + cap + '  ·  ' + km + 'km';

  var carrying  = state.carrying.length;
  var available = state.packages.filter(function(p) { return !p.picked; }).length;
  var pickable  = nearestPickable();
  var deliver   = nearestDeliverable();

  if (deliver) {
    var pkgsHere = state.packages.filter(function(p) { return state.carrying.includes(p.id) && p.destId === deliver.id; });
    var pts = pkgsHere.reduce(function(s, p) { return s + p.pts; }, 0);
    detailEl.textContent = 'Deliver ' + pkgsHere.length + ' pkg' + (pkgsHere.length > 1 ? 's' : '') + ' to Drop ' + deliver.label + ' for ' + pts + ' pts.';
    distEl.textContent   = Math.round(haversine(state.userPos, deliver.loc)) + 'm to drop-off';
    btn.className = 'deliver ready'; btn.textContent = 'DELIVER TO DROP ' + deliver.label; btn.onclick = attemptDeliver;
  } else if (pickable) {
    var dest2 = state.destinations.find(function(d) { return d.id === pickable.destId; });
    var wcfg  = WEIGHT[pickable.weight];
    var iStr  = pickable.item ? pickable.item + ' · ' : '';
    detailEl.textContent = iStr + wcfg.label + ' → Drop ' + (dest2 ? dest2.label : '?') + ' · ' + pickable.pts + ' pts.';
    distEl.textContent   = Math.round(haversine(state.userPos, pickable.pickupLoc)) + 'm to package';
    btn.className = 'pickup ready'; btn.textContent = 'PICK UP PACKAGE'; btn.onclick = attemptPickup;
  } else if (load >= cap && overweightInRange().length > 0) {
    detailEl.textContent = 'At capacity — deliver first, or find a lighter box.';
    distEl.textContent   = load + '/' + cap + ' units used';
    btn.className = 'pickup'; btn.textContent = 'AT CAPACITY'; btn.disabled = true;
  } else if (carrying > 0) {
    var nd = state.destinations
      .filter(function(d) { return state.carrying.some(function(id) { var p = state.packages.find(function(p) { return p.id === id; }); return p && p.destId === d.id; }); })
      .reduce(function(b, d) { if (!b) return d; return haversine(state.userPos, d.loc) < haversine(state.userPos, b.loc) ? d : b; }, null);
    if (nd) {
      detailEl.textContent = 'Walk to Drop ' + nd.label + ' to deliver ' + carrying + ' pkg' + (carrying > 1 ? 's' : '') + '.';
      distEl.textContent   = Math.round(haversine(state.userPos, nd.loc)) + 'm to Drop ' + nd.label;
    } else {
      detailEl.textContent = 'Walk to a drop zone to deliver.';
      distEl.textContent   = '';
    }
    btn.className = 'deliver'; btn.textContent = 'DELIVER  (get closer)'; btn.disabled = true;
  } else {
    if (available > 0) {
      var np   = state.packages.filter(function(p) { return !p.picked; }).reduce(function(b, p) { if (!b) return p; return haversine(state.userPos, p.pickupLoc) < haversine(state.userPos, b.pickupLoc) ? p : b; }, null);
      var dPkg = np ? Math.round(haversine(state.userPos, np.pickupLoc)) : 0;
      detailEl.textContent = available + ' package' + (available > 1 ? 's' : '') + ' available. Walk to a 📦 to pick up.';
      distEl.textContent   = dPkg + 'm to nearest package';
    } else {
      detailEl.textContent = refreshTimer ? 'Zone is sparse. New orders arriving shortly…' : 'No packages. Walk your zone to find some.';
      distEl.textContent   = '';
    }
    btn.className = 'pickup'; btn.textContent = 'PICK UP  (get closer)'; btn.disabled = true;
  }

  // ── INVENTORY ────────────────────────────────────────────
  if (state.carrying.length > 0) {
    var invEl = document.getElementById('inventory');
    invEl.innerHTML = state.carrying.map(function(id) {
      var p    = state.packages.find(function(p) { return p.id === id; });
      if (!p) return '';
      var dest = state.destinations.find(function(d) { return d.id === p.destId; });
      var wcfg = WEIGHT[p.weight];
      return '<div class="inv-row">' +
        '<div class="inv-info">' +
          '<div class="inv-label">' + (p.item ? esc(p.item) + ' · ' : '') + wcfg.label + ' &rarr; DROP ' + (dest ? dest.label : '?') + '</div>' +
          '<div class="inv-sub">' + p.pts + ' PTS</div>' +
        '</div>' +
        '<button class="inv-abandon" onclick="abandonPackage(\'' + id + '\')">ABANDON</button>' +
        '</div>';
    }).join('');
    invEl.style.display = 'block';
  }
}

// ═══════════════════════════════════════════════════════════
//  ONBOARDING
// ═══════════════════════════════════════════════════════════

var obStep = 0;
var OB_TOTAL = 4;

function renderOnboardingStep() {
  document.getElementById('onboarding-overlay').classList.add('open');
  var dots = '';
  for (var i = 0; i < OB_TOTAL; i++) {
    dots += '<div class="ob-dot' + (i === obStep ? ' active' : '') + '"></div>';
  }
  var content = '';
  if (obStep === 0) {
    content =
      '<div class="ob-title">WELCOME TO PORTER</div>' +
      '<div class="ob-body">A walking game played in your real neighborhood. Walk the streets, pick up packages, and deliver them across your zone to score points.</div>';
  } else if (obStep === 1) {
    content =
      '<div class="ob-title">WHO ARE YOU?</div>' +
      '<input class="s-name-input" id="ob-name-input" type="text" maxlength="20" ' +
        'placeholder="ENTER YOUR NAME…" autocomplete="off" autocorrect="off" spellcheck="false" ' +
        'value="' + (state.playerName || '').replace(/"/g, '&quot;') + '">' +
      '<div class="ob-body" style="font-size:11px;margin-top:-8px">Your name shows up on shared scores.</div>';
  } else if (obStep === 2) {
    content =
      '<div class="ob-title">HOW IT WORKS</div>' +
      '<ul class="ob-bullets">' +
        '<li>Packages (📦) appear in your zone. Walk to them to pick up.</li>' +
        '<li>Drop them at delivery zones (🏠) to score points.</li>' +
        '<li>Heavier packages are worth more — but use more carry capacity.</li>' +
        '<li>Your capacity grows as your score climbs.</li>' +
      '</ul>';
  } else {
    content =
      '<div class="ob-title">DRAW YOUR ZONE</div>' +
      '<div class="ob-body">Step outside to get a GPS lock, then set up your play area.</div>' +
      '<ul class="ob-bullets">' +
        '<li>Tap ☰ to open Settings.</li>' +
        '<li>Tap <strong style="color:#5ab05a">+ ADD ZONE</strong> and draw hexes on the map.</li>' +
        '<li>Tap <strong style="color:#5ab05a">FINISH ZONE</strong> when done.</li>' +
        '<li>Enable the ◎ follow button to stay centered as you walk.</li>' +
      '</ul>';
  }
  var isLast  = obStep === OB_TOTAL - 1;
  var showBack = obStep > 0;
  document.getElementById('onboarding-card').innerHTML =
    '<div class="ob-dots">' + dots + '</div>' +
    content +
    '<div class="ob-nav">' +
    (showBack ? '<button class="ob-back" onclick="onboardingBack()">BACK</button>' : '') +
    '<button class="ob-next" onclick="onboardingNext()" style="' + (!showBack ? 'flex:1' : '') + '">' +
      (isLast ? 'GET STARTED' : 'NEXT') +
    '</button>' +
    '</div>';
  if (obStep === 1) {
    setTimeout(function() { var inp = document.getElementById('ob-name-input'); if (inp) inp.focus(); }, 80);
  }
}

function onboardingNext() {
  if (obStep === 1) {
    var inp = document.getElementById('ob-name-input');
    if (inp) {
      savePlayerName(inp.value);
      var nameEl = document.getElementById('s-player-name');
      if (nameEl) nameEl.value = state.playerName;
    }
  }
  if (obStep < OB_TOTAL - 1) { obStep++; renderOnboardingStep(); }
  else { finishOnboarding(); }
}

function onboardingBack() {
  if (obStep > 0) { obStep--; renderOnboardingStep(); }
}

function finishOnboarding() {
  localStorage.setItem('porter_onboarded', '1');
  document.getElementById('onboarding-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════

function haversine(a, b) {
  var R = 6371000, dLat = (b.lat - a.lat) * Math.PI / 180, dLng = (b.lng - a.lng) * Math.PI / 180;
  var s = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.asin(Math.sqrt(s));
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

// Migrate any saved zones from square {gx,gy} format to hex {q,r}
(function migrateZones() {
  var changed = false;
  state.zones.forEach(function(zone) {
    if (!zone.cells || !zone.cells.length || 'q' in zone.cells[0]) return;
    var seen = new Set();
    zone.cells = zone.cells.reduce(function(acc, c) {
      var lat = c.gy * CELL_LAT_DEG, lng = c.gx * CELL_LNG_DEG;
      var h = latLngToHex(lat, lng), k = hexKey(h.q, h.r);
      if (!seen.has(k)) { seen.add(k); acc.push(h); }
      return acc;
    }, []);
    changed = true;
  });
  if (changed) saveZones();
}());

initDrawCanvas();
updateHUD();
if (!localStorage.getItem('porter_onboarded')) { obStep = 0; renderOnboardingStep(); }
</script>
