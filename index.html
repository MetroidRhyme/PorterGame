<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PORTER</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0d8c8;
      font-family: 'Courier New', monospace;
      height: 100dvh; overflow: hidden;
    }

    #map         { position: fixed; inset: 0; z-index: 0; }
    #draw-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── TOP HUD ── */
    #hud-top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    #game-title { font-size: 18px; font-weight: bold; letter-spacing: 6px; color: #e8a030; flex-shrink: 0; }
    #score-display { text-align: right; flex-shrink: 0; }
    #score-display .label { font-size: 10px; color: #555; letter-spacing: 2px; }
    #score-display .value { font-size: 22px; color: #e8a030; }

    #settings-btn, #follow-btn {
      font-size: 20px; line-height: 1; padding: 10px 14px; border-radius: 4px;
      background: transparent; color: #999; border: 1px solid #2a2a3a; cursor: pointer;
      touch-action: manipulation; min-height: 44px; min-width: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #settings-btn:active, #follow-btn:active { color: #bbb; border-color: #4a4a5a; }
    #follow-btn.active { color: #5ab05a; border-color: #1e4020; }

    #gps-status {
      position: fixed; top: 74px; right: 12px; z-index: 1999;
      font-size: 10px; letter-spacing: 2px; padding: 4px 10px; border-radius: 2px;
      pointer-events: none;
    }
    #gps-status.acquiring { background: rgba(80,40,0,0.9);  color: #e8a030; }
    #gps-status.locked    { background: rgba(0,50,0,0.9);   color: #5ab05a; }

    /* ── SETTINGS DRAWER ── */
    #settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 4000;
      background: rgba(0,0,0,0.55);
    }
    #settings-overlay.open { display: block; }
    #settings-drawer {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 4001;
      background: #0d0d14; border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px 18px 0 0; max-height: 82vh; overflow-y: auto;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    #settings-drawer.open { transform: translateY(0); }

    .s-handle {
      display: flex; justify-content: center; padding: 12px 0 4px; cursor: pointer;
    }
    .s-handle::before {
      content: ''; display: block; width: 44px; height: 4px;
      background: #2e2e3e; border-radius: 2px;
    }
    .s-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 20px 14px;
    }
    .s-title { font-size: 10px; letter-spacing: 4px; color: #555; }
    .s-close {
      font-family: 'Courier New', monospace; font-size: 14px; color: #555;
      background: transparent; border: none; cursor: pointer; padding: 8px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-close:active { color: #bbb; }

    .s-section { padding: 0 20px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
    .s-section-label { font-size: 10px; letter-spacing: 3px; color: #555; padding: 14px 0 10px; }

    .s-zone-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .s-zone-toggle {
      flex: 1; padding: 10px 14px; border-radius: 4px; text-align: left;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 2px;
      cursor: pointer; border: 1px solid; background: rgba(0,0,0,0.3);
      touch-action: manipulation; min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .s-zone-edit {
      font-size: 14px; color: #555; background: transparent;
      border: 1px solid #2a2a3a; border-radius: 4px; cursor: pointer;
      padding: 10px 12px; min-height: 44px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-zone-edit:active { color: #5ab05a; border-color: #1e4020; }
    .s-zone-del {
      font-size: 14px; color: #555; background: transparent;
      border: 1px solid #2a2a3a; border-radius: 4px; cursor: pointer;
      padding: 10px 12px; min-height: 44px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-zone-del:active { color: #c04040; border-color: #602020; }
    .s-empty { font-size: 12px; color: #3a3a4a; letter-spacing: 1px; padding: 6px 0 4px; }

    .s-btn {
      display: block; width: 100%; margin-top: 8px; padding: 14px;
      border-radius: 4px; font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 3px; cursor: pointer;
      touch-action: manipulation; min-height: 48px; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .s-btn-green  { background: #0a1020; color: #5ab05a; border: 1px solid #1e3020; }
    .s-btn-green:active  { background: #0e1828; }
    .s-btn-dim    { background: transparent; color: #777; border: 1px solid #2a2a3a; }
    .s-btn-dim:active    { color: #aaa; border-color: #4a4a5a; }
    .s-btn-danger { background: transparent; color: #7a2020; border: 1px solid #2a1010; }
    .s-btn-danger:active { color: #c04040; border-color: #602020; }

    /* ── BOTTOM HUD ── */
    #hud-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px 18px 0 0;
      padding-bottom: max(18px, env(safe-area-inset-bottom));
    }
    #hud-collapse-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 12px 0 6px;
      background: transparent; border: none; cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #hud-collapse-btn::before {
      content: ''; display: block; width: 44px; height: 4px;
      background: #2e2e3e; border-radius: 2px; transition: background 0.15s;
    }
    #hud-collapse-btn:active::before { background: #4a4a5a; }

    #collapsible-hud {
      overflow: hidden; max-height: 800px; opacity: 1; padding: 0 16px;
      transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.20s ease;
    }
    #hud-bottom.collapsed #collapsible-hud { max-height: 0; opacity: 0; }

    #mission-status   { font-size: 10px; letter-spacing: 3px; color: #888; margin-bottom: 5px; }
    #mission-detail   { font-size: 14px; color: #a09888; line-height: 1.5; }
    #mission-distance { font-size: 11px; color: #4a7a4a; margin-top: 5px; min-height: 16px; }

    #inventory { display: none; margin-top: 10px; }
    .inv-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .inv-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .inv-label { font-size: 13px; color: #e0d8c8; letter-spacing: 1px; }
    .inv-sub   { font-size: 10px; color: #666; letter-spacing: 2px; }
    .inv-abandon {
      font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px;
      padding: 8px 12px; border-radius: 3px; cursor: pointer; min-height: 38px;
      background: transparent; color: #c04040; border: 1px solid #502020;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      white-space: nowrap; flex-shrink: 0; margin-left: 10px;
    }
    .inv-abandon:active { color: #e05050; border-color: #802020; background: rgba(60,10,10,0.4); }

    #secondary-btn {
      display: none; width: 100%; margin-top: 10px; padding: 14px;
      background: transparent; color: #555; border: 1px solid #2a2a3a; border-radius: 4px;
      font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 3px;
      cursor: pointer; touch-action: manipulation; min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }
    #secondary-btn:active { color: #c04040; border-color: #602020; }

    #action-btn {
      display: block; width: calc(100% - 32px); margin: 10px 16px 0;
      padding: 18px; border: none; border-radius: 6px;
      font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold;
      letter-spacing: 4px; cursor: pointer; min-height: 58px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #action-btn.generate { background: #111820; color: #4a7a4a; border: 1px solid #1e3020; }
    #action-btn.draw     { background: #0a1020; color: #5ab05a; border: 1px solid #1e3020; }
    #action-btn.pickup   { background: #1a1000; color: #a06018; border: 1px solid #2e1e00; }
    #action-btn.pickup.ready  { background: #e8a030; color: #0a0a0f; border-color: #e8a030; }
    #action-btn.deliver  { background: #00101a; color: #2060a0; border: 1px solid #001e30; }
    #action-btn.deliver.ready { background: #3080c0; color: #0a0a0f; border-color: #3080c0; }
    #action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #completion-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(20,60,120,0.18);
      flex-direction: column; justify-content: center; align-items: center;
      pointer-events: none;
    }
    #completion-overlay.show { display: flex; animation: flash 0.6s ease-out; }
    @keyframes flash {
      0%   { background: rgba(20,60,120,0.55); }
      100% { background: rgba(20,60,120,0.18); }
    }
    .completion-label { font-size: 14px; letter-spacing: 8px; color: #3080c0; }
    .completion-pts   { font-size: 56px; font-weight: bold; color: #e8a030; margin-top: 4px; }
    .completion-sub   { font-size: 11px; letter-spacing: 3px; color: #555; margin-top: 6px; }
  </style>
</head>
<body>

<div id="hud-top">
  <div id="game-title">PORTER</div>
  <button id="settings-btn" onclick="openSettings()">&#9776;</button>
  <button id="follow-btn" onclick="toggleFollow()">&#9678;</button>
  <div id="score-display">
    <div class="label">SCORE</div>
    <div class="value" id="score-value">0</div>
  </div>
</div>

<div id="map"></div>
<canvas id="draw-canvas"></canvas>

<div id="gps-status" class="acquiring">ACQUIRING GPS</div>

<!-- ── SETTINGS DRAWER ── -->
<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-drawer">
  <div class="s-handle" onclick="closeSettings()"></div>
  <div class="s-header">
    <span class="s-title">SETTINGS</span>
    <button class="s-close" onclick="closeSettings()">&#10005;</button>
  </div>

  <div class="s-section">
    <div class="s-section-label">ZONES</div>
    <div id="s-zone-list"></div>
    <button class="s-btn s-btn-green" onclick="settingsAddZone()">+ ADD ZONE</button>
    <button class="s-btn s-btn-danger" id="s-clear-btn" style="display:none" onclick="settingsClearZones()">CLEAR ALL ZONES</button>
  </div>

  <div class="s-section">
    <div class="s-section-label">DATA</div>
    <button class="s-btn s-btn-dim" onclick="exportData()">EXPORT SAVE FILE</button>
    <label class="s-btn s-btn-dim" style="cursor:pointer">
      IMPORT SAVE FILE
      <input id="import-input" type="file" accept=".json" style="display:none" onchange="importData(this)">
    </label>
    <button class="s-btn s-btn-danger" onclick="resetProfile()">RESET PROFILE</button>
  </div>
</div>

<div id="hud-bottom">
  <button id="hud-collapse-btn" onclick="toggleHUD()" aria-label="Toggle panel"></button>
  <div id="collapsible-hud">
    <div id="mission-status">STANDBY</div>
    <div id="mission-detail">Acquiring GPS lock…</div>
    <div id="mission-distance"></div>
    <div id="inventory"></div>
    <button id="secondary-btn"></button>
  </div>
  <button id="action-btn" class="generate" disabled>WAITING FOR GPS</button>
</div>

<div id="completion-overlay">
  <div class="completion-label">DELIVERY COMPLETE</div>
  <div class="completion-pts" id="completion-pts">+0</div>
  <div class="completion-sub" id="completion-total">SCORE: 0</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  STATE   phases: no_gps | active
// ═══════════════════════════════════════════════════════════

const state = {
  score:       parseInt(localStorage.getItem('porter_score')       || '0'),
  deliveries:  parseInt(localStorage.getItem('porter_deliveries')  || '0'),
  phase:       'no_gps',
  following:   false,
  userPos:     null,
  sessionDist: parseFloat(localStorage.getItem('porter_session_dist') || '0'),
  lastPos:     null,

  zones:         JSON.parse(localStorage.getItem('porter_zones')        || '[]'),
  drawing:       false,
  gridCells:     null,
  editingZoneId: null,

  packages:     JSON.parse(localStorage.getItem('porter_packages')     || '[]'),
  destinations: JSON.parse(localStorage.getItem('porter_destinations') || '[]'),
  carrying:     JSON.parse(localStorage.getItem('porter_carrying')     || '[]'),
};

const PROXIMITY_M   = 20;
const MAX_GPS_DELTA = 50;
const CELL_LAT_DEG  = 20 / 111111;
var   CELL_LNG_DEG  = parseFloat(localStorage.getItem('porter_cell_lng')) || CELL_LAT_DEG;
const ZONE_COLORS   = ['#e8a030', '#3080c0', '#5ab05a', '#c04040', '#8060d0', '#30a0a0'];

const WEIGHT = {
  1: { label: 'LIGHT',    multiplier: 0.7, size: 36 },
  2: { label: 'STANDARD', multiplier: 1.0, size: 48 },
  3: { label: 'HEAVY',    multiplier: 1.5, size: 60 },
};

function vibrate(p)    { if (navigator.vibrate) navigator.vibrate(p); }
function getCapacity() { return Math.min(3 + Math.floor(state.score / 500), 12); }
function currentLoad() {
  return state.carrying.reduce(function(s, id) {
    var p = state.packages.find(function(p) { return p.id === id; });
    return s + (p ? p.weight : 0);
  }, 0);
}

// ═══════════════════════════════════════════════════════════
//  FOLLOW MODE
// ═══════════════════════════════════════════════════════════

function toggleFollow() {
  state.following = !state.following;
  document.getElementById('follow-btn').classList.toggle('active', state.following);
  if (state.following && state.userPos) {
    map.panTo([state.userPos.lat, state.userPos.lng], { animate: true, duration: 0.4 });
  }
}

// ═══════════════════════════════════════════════════════════
//  HUD COLLAPSE
// ═══════════════════════════════════════════════════════════

function expandHUD() { document.getElementById('hud-bottom').classList.remove('collapsed'); }
function toggleHUD() { document.getElementById('hud-bottom').classList.toggle('collapsed'); }

// ═══════════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════════

const map = L.map('map', { zoomControl: false, attributionControl: false, minZoom: 13 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
map.setView([20, 0], 3);

function makeIcon(bg, emoji, size) {
  size = size || 48;
  var fs = Math.round(size * 0.5);
  return L.divIcon({
    html: '<div style="background:' + bg + ';border:2px solid rgba(255,255,255,0.25);border-radius:50%;width:' + size + 'px;height:' + size + 'px;display:flex;align-items:center;justify-content:center;font-size:' + fs + 'px;box-shadow:0 2px 12px rgba(0,0,0,0.7)">' + emoji + '</div>',
    iconSize: [size, size], iconAnchor: [size / 2, size / 2], className: ''
  });
}

const icons = {
  user:        makeIcon('#1a3050', '🧍', 44),
  pickup:      makeIcon('#2a1800', '📦'),
  dest:        makeIcon('#0c1e30', '🏠'),
  dest_next:   makeIcon('#3080c0', '🏠'),
  dest_queued: makeIcon('#164060', '🏠'),
};

let userMarker   = null;
let orderMarkers = [];
let zoneMarkers  = [];

// ═══════════════════════════════════════════════════════════
//  GPS
// ═══════════════════════════════════════════════════════════

if (!navigator.geolocation) {
  document.getElementById('mission-detail').textContent = 'Geolocation not supported.';
} else {
  navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 15000
  });
}

function onLocationUpdate(pos) {
  var lat = pos.coords.latitude, lng = pos.coords.longitude;
  var newPos = { lat: lat, lng: lng };
  if (state.lastPos) {
    var delta = haversine(state.lastPos, newPos);
    if (delta > 0 && delta <= MAX_GPS_DELTA) {
      state.sessionDist += delta;
      localStorage.setItem('porter_session_dist', state.sessionDist.toFixed(1));
    }
  }
  state.lastPos = newPos;
  state.userPos = newPos;
  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: icons.user, zIndexOffset: 1000 }).addTo(map);
    map.setView([lat, lng], 17);
    onGpsLocked();
  } else {
    userMarker.setLatLng([lat, lng]);
    if (state.following) map.panTo([lat, lng], { animate: true, duration: 0.4 });
  }
  renderOrderMarkers();
  updateHUD();
}

function onLocationError(err) {
  var msgs = { 1: 'Location permission denied.', 2: 'Position unavailable.', 3: 'GPS timed out. Retrying…' };
  document.getElementById('mission-detail').textContent = msgs[err.code] || err.message;
}

function onGpsLocked() {
  var badge = document.getElementById('gps-status');
  badge.textContent = 'GPS LOCKED';
  badge.className   = 'locked';
  setTimeout(function() { badge.style.display = 'none'; }, 3000);
  state.phase  = 'active';
  CELL_LNG_DEG = CELL_LAT_DEG / Math.cos(state.userPos.lat * Math.PI / 180);
  localStorage.setItem('porter_cell_lng', CELL_LNG_DEG);
  vibrate(30);
  renderZoneMarkers();
  generateOrders();
  expandHUD();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════

function saveZones()     { localStorage.setItem('porter_zones', JSON.stringify(state.zones)); }
function saveGameState() {
  localStorage.setItem('porter_carrying',     JSON.stringify(state.carrying));
  localStorage.setItem('porter_packages',     JSON.stringify(state.packages));
  localStorage.setItem('porter_destinations', JSON.stringify(state.destinations));
}

// ═══════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════

function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
  document.getElementById('settings-drawer').classList.add('open');
  renderSettingsPanel();
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  document.getElementById('settings-drawer').classList.remove('open');
}

function renderSettingsPanel() {
  var listEl   = document.getElementById('s-zone-list');
  var clearBtn = document.getElementById('s-clear-btn');

  if (!state.zones.length) {
    listEl.innerHTML = '<div class="s-empty">No zones defined yet.</div>';
    clearBtn.style.display = 'none';
  } else {
    clearBtn.style.display = 'block';
    listEl.innerHTML = state.zones.map(function(z) {
      return '<div class="s-zone-row">' +
        '<button class="s-zone-toggle" ' +
        'style="color:' + (z.active ? z.color : '#555') + ';border-color:' + (z.active ? z.color : '#2a2a3a') + '" ' +
        'onclick="settingsToggleZone(\'' + z.id + '\')">' + z.name.toUpperCase() + '</button>' +
        '<button class="s-zone-edit" onclick="settingsEditZone(\'' + z.id + '\')">&#9998;</button>' +
        '<button class="s-zone-del" onclick="settingsDeleteZone(\'' + z.id + '\')">&#10005;</button>' +
        '</div>';
    }).join('');
  }
}

function settingsAddZone()      { closeSettings(); startDrawing(); }
function settingsEditZone(id)   { closeSettings(); startEditZone(id); }
function settingsToggleZone(id) { toggleZoneActive(id); renderSettingsPanel(); }
function settingsDeleteZone(id) { deleteZone(id);       renderSettingsPanel(); }
function settingsClearZones() {
  if (!confirm('Delete all ' + state.zones.length + ' zone' + (state.zones.length !== 1 ? 's' : '') + '?')) return;
  clearAllZones();
  renderSettingsPanel();
}

// ═══════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════

function exportData() {
  var data = {
    version:      1,
    exported:     new Date().toISOString(),
    score:        state.score,
    deliveries:   state.deliveries,
    sessionDist:  state.sessionDist,
    zones:        state.zones,
    packages:     state.packages,
    destinations: state.destinations,
    carrying:     state.carrying,
    cellLngDeg:   CELL_LNG_DEG,
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'porter_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.version || !Array.isArray(data.zones)) throw new Error('Unrecognized file format.');
      if (!confirm('Import will replace all current data. Continue?')) { input.value = ''; return; }

      state.score        = data.score        || 0;
      state.deliveries   = data.deliveries   || 0;
      state.sessionDist  = data.sessionDist  || 0;
      state.zones        = data.zones        || [];
      state.packages     = data.packages     || [];
      state.destinations = data.destinations || [];
      state.carrying     = data.carrying     || [];
      if (data.cellLngDeg) CELL_LNG_DEG = data.cellLngDeg;

      localStorage.setItem('porter_score',        state.score);
      localStorage.setItem('porter_deliveries',   state.deliveries);
      localStorage.setItem('porter_session_dist', state.sessionDist);
      if (data.cellLngDeg) localStorage.setItem('porter_cell_lng', CELL_LNG_DEG);
      saveZones();
      saveGameState();

      renderZoneMarkers();
      renderGridCanvas();
      renderOrderMarkers();
      renderSettingsPanel();
      updateHUD();
      input.value = '';
    } catch (err) {
      alert('Import failed: ' + err.message);
      input.value = '';
    }
  };
  reader.readAsText(file);
}

function resetProfile() {
  if (!confirm('Reset all data? This will permanently delete your score, zones, and inventory.')) return;
  if (!confirm('Are you sure? This cannot be undone.')) return;

  ['porter_score','porter_deliveries','porter_session_dist',
   'porter_zones','porter_packages','porter_destinations','porter_carrying','porter_cell_lng']
    .forEach(function(k) { localStorage.removeItem(k); });

  state.score        = 0;
  state.deliveries   = 0;
  state.sessionDist  = 0;
  state.lastPos      = null;
  state.zones        = [];
  state.packages     = [];
  state.destinations = [];
  state.carrying     = [];
  CELL_LNG_DEG       = CELL_LAT_DEG;

  closeSettings();
  renderZoneMarkers();
  renderGridCanvas();
  renderOrderMarkers();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  ZONE MANAGEMENT
// ═══════════════════════════════════════════════════════════

function removeZoneOrders(zone) {
  if (!zone.cells || !zone.cells.length) return;
  var zoneKeys = new Set(zone.cells.map(function(c) { return cellKey(c.gx, c.gy); }));

  var removedIds = new Set();
  state.packages = state.packages.filter(function(p) {
    var c = latLngToCell(p.pickupLoc.lat, p.pickupLoc.lng);
    if (zoneKeys.has(cellKey(c.gx, c.gy))) { removedIds.add(p.id); return false; }
    return true;
  });
  var removedDestIds = new Set();
  state.destinations = state.destinations.filter(function(d) {
    var c = latLngToCell(d.loc.lat, d.loc.lng);
    if (zoneKeys.has(cellKey(c.gx, c.gy))) { removedDestIds.add(d.id); return false; }
    return true;
  });
  state.packages = state.packages.filter(function(p) {
    if (removedDestIds.has(p.destId)) { removedIds.add(p.id); return false; }
    return true;
  });
  state.carrying = state.carrying.filter(function(cid) { return !removedIds.has(cid); });
}

function generateOrdersForZone(zone) {
  if (!zone.active) return;
  var occupied = new Set();
  state.packages.forEach(function(p) {
    var c = latLngToCell(p.pickupLoc.lat, p.pickupLoc.lng);
    occupied.add(cellKey(c.gx, c.gy));
  });
  state.destinations.forEach(function(d) {
    var c = latLngToCell(d.loc.lat, d.loc.lng);
    occupied.add(cellKey(c.gx, c.gy));
  });

  var labelOffset = state.destinations.length;
  var newDests = [];
  for (var i = 0; i < 2; i++) {
    var pt = randomPointInZone(zone, occupied);
    if (pt) newDests.push({ id: 'dest_' + Date.now() + '_' + i, loc: pt, label: String.fromCharCode(65 + (labelOffset + i) % 26) });
  }
  if (!newDests.length) return;
  state.destinations = state.destinations.concat(newDests);

  var weightPool = [1, 1, 2, 2, 3];
  for (var j = 0; j < 3; j++) {
    var pt2    = randomPointInZone(zone, occupied);
    if (!pt2) continue;
    var dest   = newDests[j % newDests.length];
    var weight = weightPool[Math.floor(Math.random() * weightPool.length)];
    var dist   = haversine(pt2, dest.loc);
    state.packages.push({
      id: 'pkg_' + Date.now() + '_' + j, pickupLoc: pt2, destId: dest.id,
      dist: dist, pts: Math.round(dist * WEIGHT[weight].multiplier),
      weight: weight, picked: false
    });
  }
}

function toggleZoneActive(id) {
  var z = state.zones.find(function(z) { return z.id === id; });
  if (!z) return;
  if (z.active) {
    if (z.cells && z.cells.length) {
      var zk = new Set(z.cells.map(function(c) { return cellKey(c.gx, c.gy); }));
      var cc = state.carrying.filter(function(cid) {
        var p = state.packages.find(function(p) { return p.id === cid; });
        if (!p) return false;
        var c = latLngToCell(p.pickupLoc.lat, p.pickupLoc.lng);
        return zk.has(cellKey(c.gx, c.gy));
      }).length;
      if (cc > 0 && !confirm(cc + ' carried package' + (cc > 1 ? 's' : '') + ' from this zone will be deleted. Disable zone?')) return;
    }
    z.active = false;
    removeZoneOrders(z);
  } else {
    z.active = true;
    if (state.phase === 'active') generateOrdersForZone(z);
  }
  saveZones(); saveGameState(); renderZoneMarkers(); renderOrderMarkers(); updateHUD();
}

function deleteZone(id) {
  var z = state.zones.find(function(z) { return z.id === id; });
  if (!z || !confirm('Delete zone "' + z.name + '"?')) return;
  removeZoneOrders(z);
  state.zones = state.zones.filter(function(z) { return z.id !== id; });
  saveZones(); saveGameState(); renderZoneMarkers(); renderOrderMarkers(); updateHUD();
}

function clearAllZones() {
  state.zones = []; state.packages = []; state.destinations = []; state.carrying = [];
  saveZones(); saveGameState(); renderZoneMarkers(); renderOrderMarkers(); updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════

var drawCanvas, drawCtx;

function initDrawCanvas() {
  var dpr = window.devicePixelRatio || 1;
  var W   = window.innerWidth, H = window.innerHeight;
  drawCanvas = document.getElementById('draw-canvas');
  drawCanvas.width  = W * dpr;  drawCanvas.height = H * dpr;
  drawCanvas.style.width = W + 'px'; drawCanvas.style.height = H + 'px';
  drawCtx = drawCanvas.getContext('2d');
  drawCtx.scale(dpr, dpr);
}

window.addEventListener('resize', function() { initDrawCanvas(); renderGridCanvas(); });

// ═══════════════════════════════════════════════════════════
//  GRID SYSTEM
// ═══════════════════════════════════════════════════════════

function latLngToCell(lat, lng) {
  return { gx: Math.floor(lng / CELL_LNG_DEG), gy: Math.floor(lat / CELL_LAT_DEG) };
}
function cellBounds(gx, gy) {
  return {
    sw: { lat: gy * CELL_LAT_DEG,       lng: gx * CELL_LNG_DEG },
    ne: { lat: (gy + 1) * CELL_LAT_DEG, lng: (gx + 1) * CELL_LNG_DEG },
  };
}
function cellKey(gx, gy) { return gx + ',' + gy; }

function toggleCell(latlng) {
  var c   = latLngToCell(latlng.lat, latlng.lng);
  var key = cellKey(c.gx, c.gy);
  if (state.gridCells.has(key)) state.gridCells.delete(key);
  else                           state.gridCells.add(key);
  renderGridCanvas();
  updateHUD();
}

function findConnectedComponents(cellSet) {
  var visited = new Set(), comps = [];
  cellSet.forEach(function(startKey) {
    if (visited.has(startKey)) return;
    var comp = new Set(), queue = [startKey];
    visited.add(startKey); comp.add(startKey);
    while (queue.length) {
      var key = queue.shift(), parts = key.split(',');
      var gx = parseInt(parts[0]), gy = parseInt(parts[1]);
      [cellKey(gx+1,gy), cellKey(gx-1,gy), cellKey(gx,gy+1), cellKey(gx,gy-1)].forEach(function(nk) {
        if (cellSet.has(nk) && !visited.has(nk)) { visited.add(nk); comp.add(nk); queue.push(nk); }
      });
    }
    comps.push(comp);
  });
  return comps;
}

function cellRect(gx, gy) {
  var b  = cellBounds(gx, gy);
  var sw = map.latLngToContainerPoint([b.sw.lat, b.sw.lng]);
  var ne = map.latLngToContainerPoint([b.ne.lat, b.ne.lng]);
  var x  = Math.min(sw.x, ne.x), y = Math.min(sw.y, ne.y);
  var w  = Math.abs(ne.x - sw.x), h = Math.abs(ne.y - sw.y);
  if (x + w < -2 || x > window.innerWidth + 2 || y + h < -2 || y > window.innerHeight + 2) return null;
  return { x: x, y: y, w: w, h: h };
}

function renderZoneCells(cells, color, fillOpacity, strokeOpacity) {
  var cellSet = new Set(cells.map(function(c) { return cellKey(c.gx, c.gy); }));
  drawCtx.fillStyle = color; drawCtx.strokeStyle = color; drawCtx.lineWidth = 2;

  drawCtx.globalAlpha = fillOpacity;
  cells.forEach(function(c) {
    var r = cellRect(c.gx, c.gy);
    if (!r) return;
    drawCtx.fillRect(r.x - 0.5, r.y - 0.5, r.w + 1, r.h + 1);
  });

  drawCtx.globalAlpha = strokeOpacity;
  drawCtx.beginPath();
  cells.forEach(function(c) {
    var r = cellRect(c.gx, c.gy);
    if (!r) return;
    if (!cellSet.has(cellKey(c.gx,     c.gy + 1))) { drawCtx.moveTo(r.x,       r.y      ); drawCtx.lineTo(r.x + r.w, r.y      ); }
    if (!cellSet.has(cellKey(c.gx,     c.gy - 1))) { drawCtx.moveTo(r.x,       r.y + r.h); drawCtx.lineTo(r.x + r.w, r.y + r.h); }
    if (!cellSet.has(cellKey(c.gx - 1, c.gy    ))) { drawCtx.moveTo(r.x,       r.y      ); drawCtx.lineTo(r.x,       r.y + r.h); }
    if (!cellSet.has(cellKey(c.gx + 1, c.gy    ))) { drawCtx.moveTo(r.x + r.w, r.y      ); drawCtx.lineTo(r.x + r.w, r.y + r.h); }
  });
  drawCtx.stroke();
  drawCtx.globalAlpha = 1.0;
}

var _rafPending = false;
function scheduleGridRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(function() { _rafPending = false; renderGridCanvas(); });
}

function renderOrderLines() {
  if (state.phase !== 'active') return;
  drawCtx.save();
  drawCtx.lineCap     = 'round';
  drawCtx.lineWidth   = 1.5;
  drawCtx.setLineDash([3, 7]);

  state.packages.forEach(function(p) {
    var dest = state.destinations.find(function(d) { return d.id === p.destId; });
    if (!dest) return;
    var origin   = p.picked && state.userPos ? state.userPos : p.pickupLoc;
    var from     = map.latLngToContainerPoint([origin.lat,   origin.lng  ]);
    var to       = map.latLngToContainerPoint([dest.loc.lat, dest.loc.lng]);
    drawCtx.globalAlpha = p.picked ? 0.75 : 0.6;
    drawCtx.strokeStyle = p.picked ? '#3080c0' : '#e8a030';
    drawCtx.beginPath();
    drawCtx.moveTo(from.x, from.y);
    drawCtx.lineTo(to.x,   to.y);
    drawCtx.stroke();
  });

  drawCtx.restore();
}

function renderGridCanvas() {
  if (!drawCtx) return;
  drawCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  var editingId = state.drawing ? state.editingZoneId : null;
  var fillOp   = state.drawing ? 0.18 : 0.1;
  var strokeOp = state.drawing ? 0.9  : 0.7;

  state.zones.forEach(function(zone) {
    if (!zone.cells || !zone.cells.length || !zone.active) return;
    if (zone.id === editingId) return; // replaced by gridCells below
    renderZoneCells(zone.cells, zone.color, fillOp, strokeOp);
  });

  if (state.drawing && state.gridCells && state.gridCells.size) {
    var editZone = editingId ? state.zones.find(function(z) { return z.id === editingId; }) : null;
    var color    = editZone ? editZone.color : ZONE_COLORS[state.zones.length % ZONE_COLORS.length];
    var cells    = Array.from(state.gridCells).map(function(key) {
      var p = key.split(',');
      return { gx: parseInt(p[0]), gy: parseInt(p[1]) };
    });
    renderZoneCells(cells, color, 0.25, 1.0);
  }

  if (!state.drawing) renderOrderLines();
}

map.on('move zoom', scheduleGridRender);
map.on('dragstart', function() {
  if (state.following) {
    state.following = false;
    document.getElementById('follow-btn').classList.remove('active');
  }
});

map.on('click', function(e) {
  if (!state.drawing) return;
  toggleCell(e.latlng);
});

function startDrawing() {
  state.drawing   = true;
  state.gridCells = new Set();
  renderOrderMarkers();
  renderGridCanvas();
  updateHUD();
}

function cancelDraw() {
  state.drawing       = false;
  state.gridCells     = null;
  state.editingZoneId = null;
  renderGridCanvas();
  renderOrderMarkers();
  updateHUD();
}

function finishDraw() {
  if (!state.drawing || !state.gridCells || !state.gridCells.size) return;
  if (state.editingZoneId) { finishEdit(); return; }
  state.drawing = false;

  var comps    = findConnectedComponents(state.gridCells);
  var baseName = prompt('Zone name (leave blank to auto-name):');
  if (baseName === null) { state.gridCells = null; renderGridCanvas(); updateHUD(); return; }
  baseName = baseName.trim();

  var newZones = [];
  comps.forEach(function(comp, idx) {
    var cells = Array.from(comp).map(function(key) {
      var p = key.split(',');
      return { gx: parseInt(p[0]), gy: parseInt(p[1]) };
    });
    var name  = baseName || ('Zone ' + (state.zones.length + 1));
    if (comps.length > 1) name += ' ' + (idx + 1);
    var color = ZONE_COLORS[state.zones.length % ZONE_COLORS.length];
    var z = { id: 'zone_' + Date.now() + '_' + idx, name: name, color: color, cells: cells, active: true };
    state.zones.push(z);
    newZones.push(z);
  });

  state.gridCells = null;
  saveZones();
  renderGridCanvas();
  if (state.phase === 'active') {
    newZones.forEach(function(z) { generateOrdersForZone(z); });
    saveGameState();
    renderOrderMarkers();
  }
  updateHUD();
}

function startEditZone(id) {
  var zone = state.zones.find(function(z) { return z.id === id; });
  if (!zone) return;
  state.drawing       = true;
  state.editingZoneId = id;
  state.gridCells     = new Set(zone.cells ? zone.cells.map(function(c) { return cellKey(c.gx, c.gy); }) : []);
  renderOrderMarkers();
  renderGridCanvas();
  updateHUD();
}

function finishEdit() {
  var zone = state.zones.find(function(z) { return z.id === state.editingZoneId; });
  if (!zone || !state.gridCells || !state.gridCells.size) return;

  var oldKeys = new Set(zone.cells ? zone.cells.map(function(c) { return cellKey(c.gx, c.gy); }) : []);
  var newKeys = new Set(state.gridCells);

  // Remove orders on cells that are no longer in the zone
  var removedKeys = new Set();
  oldKeys.forEach(function(k) { if (!newKeys.has(k)) removedKeys.add(k); });
  if (removedKeys.size > 0) {
    var removedPkgIds = new Set();
    state.packages = state.packages.filter(function(p) {
      var c = latLngToCell(p.pickupLoc.lat, p.pickupLoc.lng);
      if (removedKeys.has(cellKey(c.gx, c.gy))) { removedPkgIds.add(p.id); return false; }
      return true;
    });
    var removedDestIds = new Set();
    state.destinations = state.destinations.filter(function(d) {
      var c = latLngToCell(d.loc.lat, d.loc.lng);
      if (removedKeys.has(cellKey(c.gx, c.gy))) { removedDestIds.add(d.id); return false; }
      return true;
    });
    state.packages = state.packages.filter(function(p) {
      if (removedDestIds.has(p.destId)) { removedPkgIds.add(p.id); return false; }
      return true;
    });
    state.carrying = state.carrying.filter(function(id) { return !removedPkgIds.has(id); });
  }

  // Handle disconnected components: first updates the edited zone, rest become new zones
  var comps = findConnectedComponents(newKeys);
  zone.cells = Array.from(comps[0]).map(function(key) {
    var p = key.split(',');
    return { gx: parseInt(p[0]), gy: parseInt(p[1]) };
  });
  var splitZones = [];
  for (var i = 1; i < comps.length; i++) {
    var cells = Array.from(comps[i]).map(function(key) {
      var p = key.split(',');
      return { gx: parseInt(p[0]), gy: parseInt(p[1]) };
    });
    var nz = { id: 'zone_' + Date.now() + '_' + i, name: zone.name + ' ' + (i + 1), color: zone.color, cells: cells, active: zone.active };
    state.zones.push(nz);
    splitZones.push(nz);
  }

  state.editingZoneId = null;
  state.drawing       = false;
  state.gridCells     = null;

  saveZones();
  if (state.phase === 'active' && zone.active) {
    generateOrdersForZone(zone);
    splitZones.forEach(function(nz) { generateOrdersForZone(nz); });
    saveGameState();
  }
  renderGridCanvas();
  renderZoneMarkers();
  renderOrderMarkers();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  ZONE RENDERING  (legacy polygon zones via Leaflet only)
// ═══════════════════════════════════════════════════════════

function renderZoneMarkers() {
  zoneMarkers.forEach(function(m) { map.removeLayer(m); });
  zoneMarkers = [];
  state.zones.forEach(function(zone) {
    if (zone.cells) return;
    if (!zone.polygon || zone.polygon.length < 3 || !zone.active) return;
    var latlngs = zone.polygon.map(function(p) { return [p.lat, p.lng]; });
    var poly = L.polygon(latlngs, {
      color: zone.color, weight: 2, opacity: 0.7,
      fillColor: zone.color, fillOpacity: 0.08, interactive: false,
    }).addTo(map);
    zoneMarkers.push(poly);
  });
  renderGridCanvas();
}

// ═══════════════════════════════════════════════════════════
//  GEOMETRY
// ═══════════════════════════════════════════════════════════

function pointInPolygon(pt, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i].lng, yi = polygon[i].lat;
    var xj = polygon[j].lng, yj = polygon[j].lat;
    if (((yi > pt.lat) !== (yj > pt.lat)) &&
        (pt.lng < (xj - xi) * (pt.lat - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function randomPointInZone(zone, occupied) {
  occupied = occupied || new Set();
  if (zone.cells && zone.cells.length) {
    var free = zone.cells.filter(function(c) { return !occupied.has(cellKey(c.gx, c.gy)); });
    if (!free.length) return null;
    var c = free[Math.floor(Math.random() * free.length)];
    var b = cellBounds(c.gx, c.gy);
    occupied.add(cellKey(c.gx, c.gy));
    return { lat: b.sw.lat + CELL_LAT_DEG * 0.5, lng: b.sw.lng + CELL_LNG_DEG * 0.5 };
  }
  if (!zone.polygon || zone.polygon.length < 3) return null;
  var poly = zone.polygon;
  var lats = poly.map(function(p) { return p.lat; }), lngs = poly.map(function(p) { return p.lng; });
  var minLat = Math.min.apply(null, lats), maxLat = Math.max.apply(null, lats);
  var minLng = Math.min.apply(null, lngs), maxLng = Math.max.apply(null, lngs);
  for (var i = 0; i < 200; i++) {
    var lat = minLat + Math.random() * (maxLat - minLat);
    var lng = minLng + Math.random() * (maxLng - minLng);
    if (pointInPolygon({ lat: lat, lng: lng }, poly)) {
      var cl = latLngToCell(lat, lng), ck = cellKey(cl.gx, cl.gy);
      if (!occupied.has(ck)) {
        occupied.add(ck);
        var bc = cellBounds(cl.gx, cl.gy);
        return { lat: bc.sw.lat + CELL_LAT_DEG * 0.5, lng: bc.sw.lng + CELL_LNG_DEG * 0.5 };
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
//  ORDER GENERATION
// ═══════════════════════════════════════════════════════════

function generateOrders() {
  var active = state.zones.filter(function(z) {
    return z.active && ((z.cells && z.cells.length) || (z.polygon && z.polygon.length >= 3));
  });
  if (!active.length) { updateHUD(); return; }

  var carriedDestIds = state.carrying.map(function(id) {
    var p = state.packages.find(function(p) { return p.id === id; });
    return p ? p.destId : null;
  }).filter(Boolean);
  state.packages     = state.packages.filter(function(p) { return state.carrying.includes(p.id); });
  state.destinations = state.destinations.filter(function(d) { return carriedDestIds.includes(d.id); });

  var occupied = new Set();
  state.packages.forEach(function(p) {
    var c = latLngToCell(p.pickupLoc.lat, p.pickupLoc.lng);
    occupied.add(cellKey(c.gx, c.gy));
  });
  state.destinations.forEach(function(d) {
    var c = latLngToCell(d.loc.lat, d.loc.lng);
    occupied.add(cellKey(c.gx, c.gy));
  });

  var labelOffset = state.destinations.length;
  var newDests    = [];
  for (var i = 0; i < 2; i++) {
    var z  = active[Math.floor(Math.random() * active.length)];
    var pt = randomPointInZone(z, occupied);
    if (pt) newDests.push({ id: 'dest_' + Date.now() + '_' + i, loc: pt, label: String.fromCharCode(65 + (labelOffset + i) % 26) });
  }
  state.destinations = state.destinations.concat(newDests);
  if (!newDests.length) { updateHUD(); return; }

  var weightPool = [1, 1, 2, 2, 3];
  for (var j = 0; j < 3; j++) {
    var z2     = active[Math.floor(Math.random() * active.length)];
    var pt2    = randomPointInZone(z2, occupied);
    if (!pt2) continue;
    var dest   = newDests[j % newDests.length];
    var weight = weightPool[Math.floor(Math.random() * weightPool.length)];
    var dist   = haversine(pt2, dest.loc);
    state.packages.push({
      id: 'pkg_' + Date.now() + '_' + j, pickupLoc: pt2, destId: dest.id,
      dist: dist, pts: Math.round(dist * WEIGHT[weight].multiplier),
      weight: weight, picked: false
    });
  }
  saveGameState();
  renderOrderMarkers();
  updateHUD();
}

function checkRefresh() {
  var available = state.packages.filter(function(p) { return !p.picked; }).length;
  if (available === 0 && state.carrying.length === 0) generateOrders();
}

// ═══════════════════════════════════════════════════════════
//  PROXIMITY
// ═══════════════════════════════════════════════════════════

function nearestPickable() {
  if (!state.userPos) return null;
  var rem   = getCapacity() - currentLoad();
  var cands = state.packages.filter(function(p) {
    return !p.picked && p.weight <= rem && haversine(state.userPos, p.pickupLoc) <= PROXIMITY_M;
  });
  if (!cands.length) return null;
  return cands.reduce(function(b, p) { return haversine(state.userPos, p.pickupLoc) < haversine(state.userPos, b.pickupLoc) ? p : b; });
}

function overweightInRange() {
  if (!state.userPos) return [];
  var rem = getCapacity() - currentLoad();
  return state.packages.filter(function(p) {
    return !p.picked && p.weight > rem && haversine(state.userPos, p.pickupLoc) <= PROXIMITY_M;
  });
}

function nearestDeliverable() {
  if (!state.userPos || !state.carrying.length) return null;
  var cands = state.destinations.filter(function(d) {
    var has = state.carrying.some(function(id) {
      var p = state.packages.find(function(p) { return p.id === id; });
      return p && p.destId === d.id;
    });
    return has && haversine(state.userPos, d.loc) <= PROXIMITY_M;
  });
  if (!cands.length) return null;
  return cands.reduce(function(b, d) { return haversine(state.userPos, d.loc) < haversine(state.userPos, b.loc) ? d : b; });
}

// ═══════════════════════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════════════════════

function attemptPickup() {
  var pkg = nearestPickable();
  if (!pkg) return;
  pkg.picked = true;
  state.carrying.push(pkg.id);
  vibrate(60);
  saveGameState();
  checkRefresh(); renderOrderMarkers(); updateHUD();
}

function attemptDeliver() {
  var dest = nearestDeliverable();
  if (!dest) return;
  var pkgs = state.packages.filter(function(p) { return state.carrying.includes(p.id) && p.destId === dest.id; });
  var pts  = pkgs.reduce(function(s, p) { return s + p.pts; }, 0);
  var ids  = pkgs.map(function(p) { return p.id; });
  state.carrying     = state.carrying.filter(function(id) { return !ids.includes(id); });
  state.packages     = state.packages.filter(function(p)  { return !ids.includes(p.id); });
  state.destinations = state.destinations.filter(function(d) { return d.id !== dest.id; });
  state.score      += pts;
  state.deliveries += pkgs.length;
  localStorage.setItem('porter_score',      state.score);
  localStorage.setItem('porter_deliveries', state.deliveries);
  vibrate([80, 40, 120]);
  saveGameState();
  showCompletion(pts, pkgs.length, dest.label);
  checkRefresh(); renderOrderMarkers(); updateHUD();
}

function abandonPackage(id) {
  var p = state.packages.find(function(p) { return p.id === id; });
  if (!p) return;
  var dest = state.destinations.find(function(d) { return d.id === p.destId; });
  var wcfg = WEIGHT[p.weight];
  if (!confirm('Abandon ' + wcfg.label.toLowerCase() + ' package for Zone ' + (dest ? dest.label : '?') + ' (' + p.pts + ' pts)? It will not be reassigned.')) return;
  state.carrying    = state.carrying.filter(function(cid) { return cid !== id; });
  state.packages    = state.packages.filter(function(p)   { return p.id  !== id; });
  state.destinations = state.destinations.filter(function(d) {
    return state.packages.some(function(p) { return p.destId === d.id; });
  });
  saveGameState();
  checkRefresh();
  renderOrderMarkers();
  updateHUD();
}

function showCompletion(pts, count, zoneLabel) {
  var el = document.getElementById('completion-overlay');
  var km = (state.sessionDist / 1000).toFixed(2);
  document.getElementById('completion-pts').textContent   = '+' + pts;
  document.getElementById('completion-total').textContent =
    (count > 1 ? count + ' PKGS' : '1 PKG') +
    (zoneLabel ? ' · ZONE ' + zoneLabel : '') +
    ' · SCORE: ' + state.score + ' · ' + km + 'km walked';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ═══════════════════════════════════════════════════════════
//  ORDER MARKERS
// ═══════════════════════════════════════════════════════════

function clearMarkers() { orderMarkers.forEach(function(m) { map.removeLayer(m); }); orderMarkers = []; scheduleGridRender(); }

function renderOrderMarkers() {
  clearMarkers();
  if (state.drawing)           return;
  if (state.phase !== 'active') return;
  var pickable    = nearestPickable();
  var deliverable = nearestDeliverable();
  var rem         = getCapacity() - currentLoad();

  state.packages.filter(function(p) { return !p.picked; }).forEach(function(p) {
    var dest     = state.destinations.find(function(d) { return d.id === p.destId; });
    var isNext   = pickable && pickable.id === p.id;
    var tooheavy = p.weight > rem;
    var cfg      = WEIGHT[p.weight];
    var bg       = isNext ? '#e8a030' : (tooheavy ? '#2a1a1a' : '#2a1800');
    var m = L.marker([p.pickupLoc.lat, p.pickupLoc.lng], { icon: makeIcon(bg, '📦', cfg.size) }).addTo(map);
    m.bindTooltip(cfg.label + ' · → Zone ' + (dest ? dest.label : '?') + ' · ' + p.pts + ' pts' + (tooheavy ? ' · TOO HEAVY' : '') + ' (' + p.weight + 'u)');
    orderMarkers.push(m);
  });

  state.destinations.forEach(function(d) {
    var n      = state.carrying.filter(function(id) {
      var p = state.packages.find(function(p) { return p.id === id; });
      return p && p.destId === d.id;
    }).length;
    var isNext = deliverable && deliverable.id === d.id;
    var icon   = isNext ? icons.dest_next : (n > 0 ? icons.dest_queued : icons.dest);
    var m = L.marker([d.loc.lat, d.loc.lng], { icon: icon }).addTo(map);
    m.bindTooltip('Zone ' + d.label + (n > 0 ? ' · ' + n + ' to deliver' : ' · drop zone'));
    orderMarkers.push(m);
  });
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════

function updateHUD() {
  var statusEl = document.getElementById('mission-status');
  var detailEl = document.getElementById('mission-detail');
  var distEl   = document.getElementById('mission-distance');
  var scoreEl  = document.getElementById('score-value');
  var btn      = document.getElementById('action-btn');
  var secBtn   = document.getElementById('secondary-btn');

  scoreEl.textContent  = state.score;
  btn.className        = ''; btn.onclick = null; btn.disabled = false;
  secBtn.style.display = 'none'; secBtn.onclick = null;
  document.getElementById('inventory').style.display = 'none';

  // ── DRAWING / EDITING ────────────────────────────────────
  if (state.drawing) {
    var editing  = !!state.editingZoneId;
    var editZone = editing ? state.zones.find(function(z) { return z.id === state.editingZoneId; }) : null;
    statusEl.textContent = editing ? 'EDITING ' + (editZone ? editZone.name.toUpperCase() : 'ZONE') : 'SELECT AREA';
    detailEl.textContent = editing
      ? 'Tap cells to add or remove from zone. Pan freely.'
      : 'Tap squares to select your zone. Tap again to deselect. Pan freely.';
    var cellCount = state.gridCells ? state.gridCells.size : 0;
    distEl.textContent  = cellCount + ' cell' + (cellCount !== 1 ? 's' : '') + ' selected (~' + (cellCount * 400) + ' m²)';

    var hasCells = cellCount > 0;
    btn.className   = hasCells ? 'pickup ready' : 'generate';
    btn.textContent = editing ? 'SAVE ZONE' : 'FINISH ZONE';
    btn.disabled    = !hasCells;
    btn.onclick     = hasCells ? (editing ? finishEdit : finishDraw) : null;

    secBtn.style.display = 'block';
    secBtn.textContent   = 'CANCEL';
    secBtn.onclick       = cancelDraw;
    return;
  }

  // ── NO GPS ───────────────────────────────────────────────
  if (state.phase === 'no_gps') {
    statusEl.textContent = 'ACQUIRING GPS';
    detailEl.textContent = 'Acquiring GPS lock…';
    distEl.textContent   = '';
    btn.className = 'generate'; btn.textContent = 'WAITING FOR GPS'; btn.disabled = true;
    return;
  }

  // ── NO ACTIVE ZONES ───────────────────────────────────────
  if (!state.zones.filter(function(z) { return z.active; }).length) {
    statusEl.textContent = 'NO ZONES';
    detailEl.textContent = state.zones.length
      ? 'All zones inactive. Open settings to enable some.'
      : 'No zones defined. Open settings to add your play area.';
    distEl.textContent = '';
    btn.className = 'draw'; btn.textContent = 'OPEN SETTINGS'; btn.onclick = openSettings;
    return;
  }

  // ── ACTIVE GAMEPLAY ───────────────────────────────────────
  var load = currentLoad(), cap = getCapacity(), km = (state.sessionDist / 1000).toFixed(2);
  statusEl.textContent = 'LOAD ' + load + ' / ' + cap + '  ·  ' + km + 'km';

  var carrying  = state.carrying.length;
  var available = state.packages.filter(function(p) { return !p.picked; }).length;
  var pickable  = nearestPickable();
  var deliver   = nearestDeliverable();

  if (deliver) {
    var pkgsHere = state.packages.filter(function(p) { return state.carrying.includes(p.id) && p.destId === deliver.id; });
    var pts = pkgsHere.reduce(function(s, p) { return s + p.pts; }, 0);
    detailEl.textContent = 'Deliver ' + pkgsHere.length + ' pkg' + (pkgsHere.length > 1 ? 's' : '') + ' to Zone ' + deliver.label + ' for ' + pts + ' pts.';
    distEl.textContent   = Math.round(haversine(state.userPos, deliver.loc)) + 'm to drop-off';
    btn.className = 'deliver ready'; btn.textContent = 'DELIVER TO ZONE ' + deliver.label; btn.onclick = attemptDeliver;
  } else if (pickable) {
    var dest2 = state.destinations.find(function(d) { return d.id === pickable.destId; });
    var wcfg  = WEIGHT[pickable.weight];
    detailEl.textContent = wcfg.label + ' → Zone ' + (dest2 ? dest2.label : '?') + ' · ' + pickable.pts + ' pts · ' + pickable.weight + 'u.';
    distEl.textContent   = Math.round(haversine(state.userPos, pickable.pickupLoc)) + 'm to package';
    btn.className = 'pickup ready'; btn.textContent = 'PICK UP PACKAGE'; btn.onclick = attemptPickup;
  } else if (load >= cap && overweightInRange().length > 0) {
    detailEl.textContent = 'At capacity — deliver first, or find a lighter box.';
    distEl.textContent   = load + '/' + cap + ' units used';
    btn.className = 'pickup'; btn.textContent = 'AT CAPACITY'; btn.disabled = true;
  } else if (carrying > 0) {
    var nd = state.destinations
      .filter(function(d) { return state.carrying.some(function(id) { var p = state.packages.find(function(p) { return p.id === id; }); return p && p.destId === d.id; }); })
      .reduce(function(b, d) { if (!b) return d; return haversine(state.userPos, d.loc) < haversine(state.userPos, b.loc) ? d : b; }, null);
    if (nd) {
      detailEl.textContent = 'Walk to Zone ' + nd.label + ' to deliver ' + carrying + ' pkg' + (carrying > 1 ? 's' : '') + '.';
      distEl.textContent   = Math.round(haversine(state.userPos, nd.loc)) + 'm to Zone ' + nd.label;
    } else {
      detailEl.textContent = 'Walk to a drop zone to deliver.';
      distEl.textContent   = '';
    }
    btn.className = 'deliver'; btn.textContent = 'DELIVER  (get closer)'; btn.disabled = true;
  } else {
    if (available > 0) {
      var np   = state.packages.filter(function(p) { return !p.picked; }).reduce(function(b, p) { if (!b) return p; return haversine(state.userPos, p.pickupLoc) < haversine(state.userPos, b.pickupLoc) ? p : b; }, null);
      var dPkg = np ? Math.round(haversine(state.userPos, np.pickupLoc)) : 0;
      detailEl.textContent = available + ' package' + (available > 1 ? 's' : '') + ' available. Walk to a 📦 to pick up. (' + (cap - load) + 'u free)';
      distEl.textContent   = dPkg + 'm to nearest package';
    } else {
      detailEl.textContent = 'No packages. Move around your zone to trigger a refresh.';
      distEl.textContent   = '';
    }
    btn.className = 'pickup'; btn.textContent = 'PICK UP  (get closer)'; btn.disabled = true;
  }

  // ── INVENTORY ────────────────────────────────────────────
  if (state.carrying.length > 0) {
    var invEl = document.getElementById('inventory');
    invEl.innerHTML = state.carrying.map(function(id) {
      var p    = state.packages.find(function(p) { return p.id === id; });
      if (!p) return '';
      var dest = state.destinations.find(function(d) { return d.id === p.destId; });
      var wcfg = WEIGHT[p.weight];
      return '<div class="inv-row">' +
        '<div class="inv-info">' +
          '<div class="inv-label">' + wcfg.label + ' &rarr; ZONE ' + (dest ? dest.label : '?') + '</div>' +
          '<div class="inv-sub">' + p.weight + 'u &nbsp;&middot;&nbsp; ' + p.pts + ' PTS</div>' +
        '</div>' +
        '<button class="inv-abandon" onclick="abandonPackage(\'' + id + '\')">ABANDON</button>' +
        '</div>';
    }).join('');
    invEl.style.display = 'block';
  }
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════

function haversine(a, b) {
  var R = 6371000, dLat = (b.lat - a.lat) * Math.PI / 180, dLng = (b.lng - a.lng) * Math.PI / 180;
  var s = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.asin(Math.sqrt(s));
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

initDrawCanvas();
updateHUD();
</script>
