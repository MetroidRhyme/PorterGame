<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PORTER</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e0d8c8;
      font-family: 'Courier New', monospace;
      height: 100dvh; overflow: hidden;
    }

    #map         { position: fixed; inset: 0; z-index: 0; }
    #draw-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── TOP HUD ── */
    #hud-top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    #game-title { font-size: 18px; font-weight: bold; letter-spacing: 6px; color: #e8a030; flex-shrink: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
    #score-display { text-align: right; flex-shrink: 0; }
    #score-display .label { font-size: 10px; color: #555; letter-spacing: 2px; }
    #score-display .value { font-size: 22px; color: #e8a030; }

    #settings-btn, #follow-btn {
      font-size: 20px; line-height: 1; padding: 10px 14px; border-radius: 4px;
      background: transparent; color: #999; border: 1px solid #2a2a3a; cursor: pointer;
      touch-action: manipulation; min-height: 44px; min-width: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #settings-btn:active, #follow-btn:active { color: #bbb; border-color: #4a4a5a; }
    #follow-btn.active       { color: #5ab05a; border-color: #1e4020; }
    #follow-btn.paint-active { color: #e8a030; border-color: #4a2800; }

    #paint-picker {
      position: fixed; top: 70px; right: 12px; z-index: 1998;
      background: rgba(13,13,20,0.97); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; min-width: 200px; max-height: 50vh; overflow-y: auto;
      display: none;
    }
    #paint-picker.open { display: block; }
    .paint-zone-opt {
      display: block; width: 100%; padding: 12px 16px; text-align: left;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 2px;
      background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .paint-zone-opt:last-child { border-bottom: none; }
    .paint-zone-opt:active { background: rgba(40,40,60,0.8); }

    #gps-status {
      position: fixed; top: 74px; right: 12px; z-index: 1999;
      font-size: 10px; letter-spacing: 2px; padding: 4px 10px; border-radius: 2px;
      pointer-events: none;
    }
    #gps-status.acquiring { background: rgba(80,40,0,0.9);  color: #e8a030; }
    #gps-status.locked    { background: rgba(0,50,0,0.9);   color: #5ab05a; }

    /* ── SETTINGS DRAWER ── */
    #settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 4000;
      background: rgba(0,0,0,0.55);
    }
    #settings-overlay.open { display: block; }
    #settings-drawer {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 4001;
      background: #0d0d14; border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px 18px 0 0; max-height: 82vh; overflow-y: auto;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    #settings-drawer.open { transform: translateY(0); }

    .s-handle {
      display: flex; justify-content: center; padding: 12px 0 4px; cursor: pointer;
    }
    .s-handle::before {
      content: ''; display: block; width: 44px; height: 4px;
      background: #2e2e3e; border-radius: 2px;
    }
    .s-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 20px 14px;
    }
    .s-title { font-size: 10px; letter-spacing: 4px; color: #555; }
    .s-close {
      font-family: 'Courier New', monospace; font-size: 14px; color: #555;
      background: transparent; border: none; cursor: pointer; padding: 8px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-close:active { color: #bbb; }

    .s-section { padding: 0 20px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
    .s-section-label { font-size: 10px; letter-spacing: 3px; color: #555; padding: 14px 0 10px; }

    .s-zone-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .s-zone-toggle {
      flex: 1; padding: 10px 14px; border-radius: 4px; text-align: left;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 2px;
      cursor: pointer; border: 1px solid; background: rgba(0,0,0,0.3);
      touch-action: manipulation; min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .s-zone-edit {
      font-size: 14px; color: #555; background: transparent;
      border: 1px solid #2a2a3a; border-radius: 4px; cursor: pointer;
      padding: 10px 12px; min-height: 44px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-zone-edit:active { color: #5ab05a; border-color: #1e4020; }
    .s-zone-del {
      font-size: 14px; color: #555; background: transparent;
      border: 1px solid #2a2a3a; border-radius: 4px; cursor: pointer;
      padding: 10px 12px; min-height: 44px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-zone-del:active { color: #c04040; border-color: #602020; }
    .s-zone-share {
      font-size: 14px; color: #555; background: transparent;
      border: 1px solid #2a2a3a; border-radius: 4px; cursor: pointer;
      padding: 10px 12px; min-height: 44px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .s-zone-share:active { color: #5090d0; border-color: #1a3060; }
    .s-empty { font-size: 12px; color: #3a3a4a; letter-spacing: 1px; padding: 6px 0 4px; }
    .s-name-input {
      width: 100%; padding: 10px 14px; border-radius: 4px; margin-bottom: 8px;
      font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 2px;
      background: rgba(0,0,0,0.3); color: #e0d8c8;
      border: 1px solid #2a2a3a; outline: none; box-sizing: border-box;
    }
    .s-name-input::placeholder { color: #3a3a4a; }
    .s-name-input:focus { border-color: #4a4a6a; }

    /* ── ZONE ADJUST ── */
    #adjust-overlay {
      display: none; position: fixed; inset: 0; z-index: 3000;
      pointer-events: none;
    }
    #adjust-overlay.open { display: block; }
    #adjust-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 3001;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: max(14px, env(safe-area-inset-top)) 16px 14px;
      text-align: center; font-size: 10px; letter-spacing: 4px; color: #e8a030;
      pointer-events: all;
    }
    #adjust-pad {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: max(100px, calc(env(safe-area-inset-bottom) + 90px));
      display: grid; grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px; gap: 8px;
      pointer-events: all;
    }
    .adj-btn {
      font-size: 22px; background: rgba(10,10,15,0.88); color: #ccc;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .adj-btn:active { background: rgba(40,40,70,0.95); color: #e8a030; border-color: #e8a030; }
    .adj-center { background: transparent; border-color: transparent; cursor: default; }
    #adjust-done {
      position: fixed; bottom: max(28px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      pointer-events: all; padding: 14px 40px; border-radius: 4px;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
      background: #0a1020; color: #5ab05a; border: 1px solid #1e3020; cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #adjust-done:active { background: #0e1828; }

    .s-btn {
      display: block; width: 100%; margin-top: 8px; padding: 14px;
      border-radius: 4px; font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 3px; cursor: pointer;
      touch-action: manipulation; min-height: 48px; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .s-btn-green  { background: #0a1020; color: #5ab05a; border: 1px solid #1e3020; }
    .s-btn-green:active  { background: #0e1828; }
    .s-btn-dim    { background: transparent; color: #777; border: 1px solid #2a2a3a; }
    .s-btn-dim:active    { color: #aaa; border-color: #4a4a5a; }
    .s-btn-danger { background: transparent; color: #7a2020; border: 1px solid #2a1010; }
    .s-btn-danger:active { color: #c04040; border-color: #602020; }

    /* ── BOTTOM HUD ── */
    #hud-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px 18px 0 0;
      padding-bottom: max(18px, env(safe-area-inset-bottom));
    }
    #hud-collapse-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 12px 0 6px;
      background: transparent; border: none; cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #hud-collapse-btn::before {
      content: ''; display: block; width: 44px; height: 4px;
      background: #2e2e3e; border-radius: 2px; transition: background 0.15s;
    }
    #hud-collapse-btn:active::before { background: #4a4a5a; }

    #collapsible-hud {
      overflow: hidden; max-height: 800px; opacity: 1; padding: 0 16px;
      transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.20s ease;
    }
    #hud-bottom.collapsed #collapsible-hud { max-height: 0; opacity: 0; }

    #mission-status   { font-size: 10px; letter-spacing: 3px; color: #888; margin-bottom: 5px; }
    #mission-detail   { font-size: 14px; color: #a09888; line-height: 1.5; }
    #mission-distance { font-size: 11px; color: #4a7a4a; margin-top: 5px; min-height: 16px; }

    #inventory { display: none; margin-top: 10px; }
    .inv-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .inv-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .inv-label { font-size: 13px; color: #e0d8c8; letter-spacing: 1px; }
    .inv-sub   { font-size: 10px; color: #666; letter-spacing: 2px; }
    .inv-abandon {
      font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px;
      padding: 8px 12px; border-radius: 3px; cursor: pointer; min-height: 38px;
      background: transparent; color: #c04040; border: 1px solid #502020;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      white-space: nowrap; flex-shrink: 0; margin-left: 10px;
    }
    .inv-abandon:active { color: #e05050; border-color: #802020; background: rgba(60,10,10,0.4); }

    #secondary-btn {
      display: none; width: 100%; margin-top: 10px; padding: 14px;
      background: transparent; color: #555; border: 1px solid #2a2a3a; border-radius: 4px;
      font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 3px;
      cursor: pointer; touch-action: manipulation; min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }
    #secondary-btn:active { color: #c04040; border-color: #602020; }

    #action-btn {
      display: block; width: calc(100% - 32px); margin: 10px 16px 0;
      padding: 18px; border: none; border-radius: 6px;
      font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold;
      letter-spacing: 4px; cursor: pointer; min-height: 58px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #action-btn.generate { background: #111820; color: #4a7a4a; border: 1px solid #1e3020; }
    #action-btn.draw     { background: #0a1020; color: #5ab05a; border: 1px solid #1e3020; }
    #action-btn.pickup   { background: #1a1000; color: #a06018; border: 1px solid #2e1e00; }
    #action-btn.pickup.ready  { background: #e8a030; color: #0a0a0f; border-color: #e8a030; }
    #action-btn.deliver  { background: #00101a; color: #2060a0; border: 1px solid #001e30; }
    #action-btn.deliver.ready { background: #3080c0; color: #0a0a0f; border-color: #3080c0; }
    #action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #completion-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(20,60,120,0.18);
      flex-direction: column; justify-content: center; align-items: center;
      pointer-events: none;
    }
    #completion-overlay.show { display: flex; animation: flash 0.6s ease-out; }
    @keyframes flash {
      0%   { background: rgba(20,60,120,0.55); }
      100% { background: rgba(20,60,120,0.18); }
    }
    .completion-label { font-size: 14px; letter-spacing: 8px; color: #3080c0; }
    .completion-pts   { font-size: 56px; font-weight: bold; color: #e8a030; margin-top: 4px; }
    .completion-sub   { font-size: 11px; letter-spacing: 3px; color: #555; margin-top: 6px; }

    #refresh-btn {
      font-size: 18px; line-height: 1; padding: 10px 14px; border-radius: 4px;
      background: transparent; color: #999; border: 1px solid #2a2a3a; cursor: pointer;
      touch-action: manipulation; min-height: 44px; min-width: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #refresh-btn:active { color: #c04040; border-color: #602020; }

    /* ── CONFIRM MODAL ── */
    #confirm-overlay {
      display: none; position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,0.65); align-items: center; justify-content: center;
    }
    #confirm-overlay.open { display: flex; }
    #confirm-modal {
      background: #0d0d14; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 28px 24px 20px; width: min(320px, calc(100vw - 48px));
      display: flex; flex-direction: column; gap: 12px;
    }
    #confirm-modal .cm-title {
      font-size: 11px; letter-spacing: 4px; color: #c04040; text-align: center;
    }
    #confirm-modal .cm-body {
      font-size: 13px; color: #888; text-align: center; line-height: 1.6;
      letter-spacing: 1px;
    }
    #confirm-modal .cm-btns {
      display: flex; gap: 10px; margin-top: 4px;
    }
    #confirm-modal .cm-cancel {
      flex: 1; padding: 14px; border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
      background: transparent; color: #666; border: 1px solid #2a2a3a;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #confirm-modal .cm-cancel:active { color: #aaa; border-color: #4a4a5a; }
    #confirm-modal .cm-confirm {
      flex: 1; padding: 14px; border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
      background: rgba(60,10,10,0.4); color: #c04040; border: 1px solid #602020;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #confirm-modal .cm-confirm:active { color: #e05050; background: rgba(80,10,10,0.6); }

    /* ── DROP PANEL ── */
    #drop-overlay {
      display: none; position: fixed; inset: 0; z-index: 5000;
      background: rgba(0,0,0,0.55);
    }
    #drop-overlay.open { display: block; }
    #drop-panel {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 5001;
      background: #0d0d14; border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px 18px 0 0;
      padding: 20px 20px max(20px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    #drop-panel.open { transform: translateY(0); }

    /* ── ONBOARDING ── */
    #onboarding-overlay {
      display: none; position: fixed; inset: 0; z-index: 8500;
      background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
      padding: 24px;
    }
    #onboarding-overlay.open { display: flex; }
    .ob-card {
      background: #0d0d14; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 32px 24px 24px;
      width: min(360px, 100%); display: flex; flex-direction: column; gap: 20px;
    }
    .ob-dots { display: flex; justify-content: center; gap: 8px; }
    .ob-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a2a3a; transition: background 0.2s;
    }
    .ob-dot.active { background: #e8a030; }
    .ob-title { font-size: 11px; letter-spacing: 5px; color: #e8a030; text-align: center; }
    .ob-body { font-size: 13px; color: #888; line-height: 1.7; letter-spacing: 0.5px; text-align: center; }
    .ob-bullets { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .ob-bullets li {
      font-size: 12px; color: #888; line-height: 1.5; letter-spacing: 0.5px;
      padding-left: 18px; position: relative;
    }
    .ob-bullets li::before { content: '·'; position: absolute; left: 0; color: #e8a030; font-size: 18px; line-height: 1.1; }
    .ob-nav { display: flex; gap: 10px; margin-top: 4px; }
    .ob-back {
      flex: 1; padding: 14px; border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
      background: transparent; color: #555; border: 1px solid #2a2a3a;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .ob-back:active { color: #aaa; border-color: #4a4a5a; }
    .ob-next {
      flex: 2; padding: 14px; border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
      background: #0a1020; color: #5ab05a; border: 1px solid #1e3020;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .ob-next:active { background: #0e1828; }

    #cap-progress { font-size: 9px; color: #4a4a5a; letter-spacing: 1px; text-align: right; margin-top: 2px; }
    .completion-streak { font-size: 13px; letter-spacing: 4px; color: #e85050; margin-top: 10px; }
    .completion-level  { font-size: 11px; letter-spacing: 3px; color: #5ab05a; margin-top: 6px; }
    #toast {
      position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
      background: rgba(13,13,20,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 10px 16px; font-size: 11px; letter-spacing: 1px;
      color: #888; z-index: 5000; pointer-events: none;
      max-width: calc(100vw - 48px); text-align: center;
      opacity: 0; transition: opacity 0.3s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="hud-top">
  <div id="game-title">PORTER</div>
  <button id="settings-btn" onclick="openSettings()">&#9776;</button>
  <button id="refresh-btn" onclick="confirmRefresh()">&#x21BB;</button>
  <button id="follow-btn" onclick="toggleFollow()">&#9678;</button>
  <div id="score-display">
    <div class="label">SCORE</div>
    <div class="value" id="score-value">0</div>
    <div id="cap-progress"></div>
  </div>
</div>

<div id="map"></div>
<canvas id="draw-canvas"></canvas>

<div id="gps-status" class="acquiring">ACQUIRING GPS</div>

<div id="paint-picker"><div id="paint-zone-opts"></div></div>

<!-- ── SETTINGS DRAWER ── -->
<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-drawer">
  <div class="s-handle" onclick="closeSettings()"></div>
  <div class="s-header">
    <span class="s-title">SETTINGS</span>
    <button class="s-close" onclick="closeSettings()">&#10005;</button>
  </div>

  <div class="s-section">
    <div class="s-section-label">ZONES</div>
    <div id="s-zone-list"></div>
    <button class="s-btn s-btn-green" onclick="settingsAddZone()">+ ADD ZONE</button>
    <button class="s-btn s-btn-dim" onclick="openAdjust()">ADJUST ZONE POSITION</button>
    <button class="s-btn s-btn-danger" id="s-clear-btn" style="display:none" onclick="settingsClearZones()">CLEAR ALL ZONES</button>
  </div>

  <div class="s-section">
    <div class="s-section-label">PROFILE</div>
    <input class="s-name-input" id="s-player-name" type="text" maxlength="20"
      placeholder="ENTER NAME…" autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="savePlayerName(this.value)">
    <button class="s-btn s-btn-dim" onclick="shareProfile()">&#x2191; SHARE PROFILE</button>
  </div>

  <div class="s-section">
    <div class="s-section-label">DROPS</div>
    <button class="s-btn s-btn-dim" onclick="closeSettings();importDropFromClipboard()">&#x2193; IMPORT / SYNC DROP CODE</button>
  </div>

  <div class="s-section">
    <div class="s-section-label">DATA</div>
    <button class="s-btn s-btn-dim" onclick="exportData()">EXPORT SAVE FILE</button>

    <button class="adj-btn" onclick="adjustGrid(0, 1)">&#x2191;</button>
    <div class="adj-btn adj-center"></div>
    <button class="adj-btn" onclick="adjustGrid(-1, 0)">&#x2190;</button>
    <div class="adj-btn adj-center"></div>
    <button class="adj-btn" onclick="adjustGrid(1, 0)">&#x2192;</button>
    <div class="adj-btn adj-center"></div>
    <button class="adj-btn" onclick="adjustGrid(0, -1)">&#x2193;</button>
    <div class="adj-btn adj-center"></div>
  </div>
  <button id="adjust-done" onclick="closeAdjust()">DONE</button>
